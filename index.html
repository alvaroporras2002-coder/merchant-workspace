  function formatFollowupRange(anchor, view) {
    if (view === "day") return formatDate(anchor,{weekday:"long"});
    if (view === "week") {
      const start = startOfWeek(anchor), end = addDays(start,4);
      return `${formatDate(start,{month:"short",day:"numeric",year:undefined})} – ${formatDate(end,{month:"short",day:"numeric",year:"numeric"})}`;
    }
    return new Intl.DateTimeFormat("en-US",{month:"long",year:"numeric"}).format(anchor);
  }

  function renderFollowupCalendar(anchor, view, items) {
    if (view === "day") return renderFollowupDay(anchor,items);
    if (view === "week") return renderFollowupWeek(anchor,items);
    return renderFollowupMonth(anchor,items);
  }

  function formatTime12(value) {
    const [hoursRaw, minutesRaw] = String(value || "10:00").split(":").map(Number);
    const hours = Number.isFinite(hoursRaw) ? hoursRaw : 10;
    const minutes = Number.isFinite(minutesRaw) ? minutesRaw : 0;
    const suffix = hours >= 12 ? "PM" : "AM";
    const display = hours % 12 || 12;
    return `${display}:${String(minutes).padStart(2,"0")} ${suffix}`;
  }

  function renderFollowupDay(anchor, items) {
    const key = toISODate(anchor);
    const dayItems = items.filter(f=>f.date===key).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
    const hours = Array.from({length:15},(_,index)=>index+7);
    const scheduled = new Set();
    const rows = hours.map(hour => {
      const hourItems = dayItems.filter(f => Number(String(f.time || "10:00").split(":")[0]) === hour);
      hourItems.forEach(f=>scheduled.add(f.id));
      const hourValue = `${String(hour).padStart(2,"0")}:00`;
      return `<div class="agenda-hour-row">
        <div class="agenda-hour-label">${formatTime12(hourValue)}</div>
        <div class="agenda-hour-slot" data-drop-date="${key}" data-drop-time="${hourValue}">
          <button class="agenda-add-button" type="button" title="Create follow-up at ${formatTime12(hourValue)}" data-new-followup-date="${key}" data-new-followup-time="${hourValue}">+</button>
          <div class="agenda-slot-events">${hourItems.length ? hourItems.map(renderFollowupAgendaEvent).join("") : `<span class="agenda-empty">No follow-ups this hour.</span>`}</div>
        </div>
      </div>`;
    }).join("");
    const other = dayItems.filter(f=>!scheduled.has(f.id));
    return `<div class="card-head"><div><div class="card-kicker">Selected day</div><h3>${formatDate(anchor,{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</h3></div><button class="btn small primary" type="button" data-new-followup-date="${key}" data-new-followup-time="10:00">Add follow-up</button></div>
      <div class="day-agenda">${rows}${other.length?`<div class="agenda-hour-row"><div class="agenda-hour-label">Other</div><div class="agenda-hour-slot"><div class="agenda-slot-events">${other.map(renderFollowupAgendaEvent).join("")}</div></div></div>`:""}</div>`;
  }

  function renderFollowupAgendaEvent(f) {
    const merchant = getMerchant(f.uid);
    const overdue = f.status !== "Completed" && f.date < dateKeyInZone(new Date());
    return `<div class="agenda-event ${priorityTone(f.priority)} ${f.status==="Completed"?"completed":overdue?"overdue":""}" draggable="true" data-followup-drag="${attr(f.id)}" data-edit-followup="${attr(f.id)}" tabindex="0" role="button">
      <span><strong>${esc(merchant?.store_name || "Unassigned")}</strong><span>${esc(formatTime12(f.time||"10:00"))} · ${esc(f.reason||"Follow-up")}${f.notes?` · ${esc(f.notes)}`:""}</span></span>
      <span class="pill ${f.status==="Completed"?"green":overdue?"red":"blue"}">${esc(f.status||"Pending")}</span>
    </div>`;
  }

  function renderFollowupWeek(anchor, items) {
    const start = startOfWeek(anchor);
    return `<div class="calendar-grid">${["Mon","Tue","Wed","Thu","Fri"].map(x=>`<div class="calendar-day-name">${x}</div>`).join("")}${WORK_DAYS.map((_,i)=>{
      const date = addDays(start,i), key=toISODate(date);
      const dayItems = items.filter(f=>f.date===key).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
      return `<div class="calendar-cell ${key===dateKeyInZone(new Date())?"today":""}" data-drop-date="${key}">
        <div class="calendar-cell-head"><strong>${date.getDate()}</strong><button class="btn small square ghost" type="button" data-new-followup-date="${key}">+</button></div>
        ${dayItems.map(renderFollowupChip).join("") || `<span class="metric-sub">No follow-ups</span>`}
      </div>`;
    }).join("")}</div>`;
  }

  function renderFollowupMonth(anchor, items) {
    const first = new Date(anchor.getFullYear(),anchor.getMonth(),1,12);
    const last = new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);
    let start = new Date(first);
    while (start.getDay() !== 1) start = addDays(start,-1);
    let end = new Date(last);
    while (end.getDay() !== 5) end = addDays(end,1);
    const dates = [];
    for (let d = new Date(start); d <= end; d = addDays(d,1)) if (WORK_DAYS.includes(d.getDay())) dates.push(new Date(d));
    return `<div class="calendar-grid">${["Mon","Tue","Wed","Thu","Fri"].map(x=>`<div class="calendar-day-name">${x}</div>`).join("")}${dates.map(date=>{
      const key = toISODate(date);
      const dayItems = items.filter(f=>f.date===key).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
      const other = date.getMonth()!==anchor.getMonth();
      return `<div class="calendar-cell ${other?"other":""} ${key===dateKeyInZone(new Date())?"today":""}" data-drop-date="${key}">
        <div class="calendar-cell-head"><strong>${date.getDate()}</strong><button class="btn small square ghost" type="button" data-new-followup-date="${key}">+</button></div>
        ${dayItems.slice(0,4).map(renderFollowupChip).join("")}${dayItems.length>4?`<span class="pill">+${dayItems.length-4} more</span>`:""}
      </div>`;
    }).join("")}</div>`;
  }

  function renderActivity() {
    const anchor = new Date(state.ui.activityAnchor || new Date());
    const selectedKey = state.ui.selectedActivityDate || dateKeyInZone(new Date());
    const selectedDate = localDateFromKey(selectedKey);
    const day = dayStats(selectedKey);
    const week = rangeStats(startOfWeek(selectedDate),7);
    const weekAgg = aggregateStats(week);
    const monthStart = new Date(anchor.getFullYear(),anchor.getMonth(),1,12);
    const monthEnd = new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);
    const monthItems = [];
    for (let d = new Date(monthStart); d <= monthEnd; d = addDays(d,1)) monthItems.push(dayStats(toISODate(d)));
    const monthAgg = aggregateStats(monthItems);
    const minuteGoal = Math.max(1, Number(state.settings.callGoal || 70));
    const photoGoal = Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL));
    const callAttemptGoal = Math.max(1, Number(state.settings.callAttemptGoal || DEFAULT_CALL_ATTEMPT_GOAL));

    return `<section class="panel">
      <div class="card-head"><div><div class="card-kicker">Activity calendar</div><h2>${new Intl.DateTimeFormat("en-US",{month:"long",year:"numeric"}).format(anchor)}</h2></div><div class="button-row"><button class="btn ghost" type="button" data-activity-nav="prev">Previous</button><button class="btn blue" type="button" data-activity-nav="today">Focus today</button><button class="btn ghost" type="button" data-activity-nav="next">Next</button><button class="btn purple" type="button" data-action="downloadMonthlyActivity">Download month CSV</button></div></div>
      <div class="activity-goal-legend" aria-label="Daily activity goals">
        <span class="activity-goal-item"><i class="activity-goal-dot minutes"></i><span><strong>Call minutes</strong><small>${minuteGoal} credited minutes per day</small></span></span>
        <span class="activity-goal-item"><i class="activity-goal-dot photos"></i><span><strong>Photo goal</strong><small>${photoGoal} photos per day</small></span></span>
        <span class="activity-goal-item"><i class="activity-goal-dot calls"></i><span><strong>Call goal</strong><small>${callAttemptGoal} attempts per day</small></span></span>
      </div>
      <div class="calendar-scroll">${renderActivityCalendar(anchor,selectedKey)}</div>
    </section>
    <div class="bento-grid">
      <section class="bento-card span-6">
        <div class="card-head"><div><div class="card-kicker">Selected day</div><h3>${formatDate(selectedDate,{weekday:"long"})}</h3></div><div class="button-row"><button class="btn small blue" type="button" data-action="downloadDayTxt">TXT</button><button class="btn small purple" type="button" data-action="downloadDayCsv">CSV</button></div></div>
        <div class="bento-grid">
          ${miniMetric("Credited",mmss(day.creditedSec),"span-3")}${miniMetric("Real",mmss(day.realSec),"span-3")}${miniMetric("Calls",day.attempts,"span-3")}${miniMetric("Photos",day.photosAdded,"span-3")}
          ${miniMetric("Stores touched",day.touched,"span-4")}${miniMetric("Follow-ups created",day.createdFollowups.length,"span-4")}${miniMetric("GMV touched",money(day.gmvTouched),"span-4")}
        </div>
        <div class="divider"></div>
        <div class="timeline">${activityTimelineForDate(selectedKey).length ? activityTimelineForDate(selectedKey).map(t=>`<div class="timeline-item"><div class="timeline-icon">${t.icon}</div><div><strong>${esc(t.title)}</strong><span>${esc(t.detail)}</span></div></div>`).join("") : `<div class="empty-state"><strong>No activity</strong><span>No calls, photos, sales, credits or follow-ups were recorded for this day.</span></div>`}</div>
      </section>
      <section class="bento-card span-6">
        <div class="card-head"><div><div class="card-kicker">Weekly report</div><h3>${formatDate(startOfWeek(selectedDate),{month:"short",day:"numeric",year:undefined})} – ${formatDate(addDays(startOfWeek(selectedDate),6),{month:"short",day:"numeric",year:"numeric"})}</h3></div><button class="btn small green" type="button" data-action="downloadWeekCsv">Download CSV</button></div>
        <div class="bento-grid">${miniMetric("Credited",minutesLabel(weekAgg.creditedSec),"span-4")}${miniMetric("Attempts",weekAgg.calls,"span-4")}${miniMetric("Photos",weekAgg.photos,"span-4")}${miniMetric("Follow-ups",weekAgg.followups,"span-4")}${miniMetric("Completed",weekAgg.completedFollowups,"span-4")}${miniMetric("GMV touched",money(weekAgg.gmv),"span-4")}</div>
        <div class="divider"></div>
        <div class="table-wrap" style="max-height:300px"><table><thead><tr><th>Date</th><th>Credited</th><th>Real</th><th>Calls</th><th>Photos</th><th>Stores</th></tr></thead><tbody>${week.map(x=>`<tr><td>${esc(x.dateKey)}</td><td>${mmss(x.creditedSec)}</td><td>${mmss(x.realSec)}</td><td>${x.attempts}</td><td>${x.photosAdded}</td><td>${x.touched}</td></tr>`).join("")}</tbody></table></div>
      </section>
      <section class="bento-card span-12">
        <div class="card-head"><div><div class="card-kicker">Monthly ledger</div><h3>${monthItems.length} calendar days · ${WORK_DAYS.length} workdays per week</h3></div><span class="pill purple">${minutesLabel(monthAgg.creditedSec)} credited</span></div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Credited</th><th>Real</th><th>Calls</th><th>Photos</th><th>Stores</th><th>Follow-ups</th><th>GMV touched</th></tr></thead><tbody>${monthItems.map(x=>`<tr><td>${x.dateKey}</td><td>${mmss(x.creditedSec)}</td><td>${mmss(x.realSec)}</td><td>${x.attempts}</td><td>${x.photosAdded}</td><td>${x.touched}</td><td>${x.createdFollowups.length}</td><td>${money(x.gmvTouched)}</td></tr>`).join("")}</tbody></table></div>
      </section>
    </div>`;
  }

  function miniMetric(label,value,span="span-3") {
    return `<div class="bento-card ${span}" style="padding:12px"><div class="card-kicker">${esc(label)}</div><div class="metric-value" style="font-size:21px">${esc(value)}</div></div>`;
  }

  function renderActivityCalendar(anchor,selectedKey) {
    const first = new Date(anchor.getFullYear(),anchor.getMonth(),1,12);
    const last = new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);
    let start = new Date(first); while (start.getDay()!==1) start=addDays(start,-1);
    let end = new Date(last); while (end.getDay()!==5) end=addDays(end,1);
    const dates=[]; for(let d=new Date(start);d<=end;d=addDays(d,1)) if(WORK_DAYS.includes(d.getDay())) dates.push(new Date(d));
    const minuteGoal = Math.max(1, Number(state.settings.callGoal || 70));
    const photoGoal = Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL));
    const callAttemptGoal = Math.max(1, Number(state.settings.callAttemptGoal || DEFAULT_CALL_ATTEMPT_GOAL));
    return `<div class="activity-calendar">${["Mon","Tue","Wed","Thu","Fri"].map(x=>`<div class="calendar-day-name">${x}</div>`).join("")}${dates.map(date=>{
      const key=toISODate(date), s=dayStats(key), other=date.getMonth()!==anchor.getMonth();
      const callMinutes = Math.round(s.creditedSec / 60);
      const minutePct = clamp(callMinutes / minuteGoal * 100, 0, 100);
      const photoPct = clamp(s.photosAdded / photoGoal * 100, 0, 100);
      const callPct = clamp(s.attempts / callAttemptGoal * 100, 0, 100);
      return `<button class="activity-cell ${key===selectedKey?"selected":""}" style="opacity:${other ? .45 : 1}" type="button" data-activity-date="${key}" title="${callMinutes}/${minuteGoal} call minutes · ${s.photosAdded}/${photoGoal} photos · ${s.attempts}/${callAttemptGoal} calls"><strong>${date.getDate()}</strong><div class="activity-bars"><div class="tiny-bar minutes" aria-label="Call minutes"><span style="width:${minutePct}%"></span></div><div class="tiny-bar photos" aria-label="Photo goal"><span style="width:${photoPct}%"></span></div><div class="tiny-bar calls" aria-label="Call goal"><span style="width:${callPct}%"></span></div></div><small>${callMinutes} min · ${s.photosAdded} photos · ${s.attempts} calls</small></button>`;
    }).join("")}</div>`;
  }

  function activityTimelineForDate(key) {
    const items=[];
    state.calls.filter(c=>dateKeyInZone(c.completedAt)===key).forEach(c=>items.push({icon:"☎",title:`${getMerchant(c.uid)?.store_name||c.prospectCompany||"Unmatched call"}`,detail:`${c.disposition} · Real ${mmss(c.durationSec)} · Credited ${mmss(c.creditedSec)}`}));
    state.photos.filter(p=>dateKeyInZone(p.timestamp)===key).forEach(p=>items.push({icon:"▧",title:`${getMerchant(p.uid)?.store_name||"Merchant"}`,detail:`${p.photosAdded} photos · ${p.status}`}));
    state.sales.filter(x=>dateKeyInZone(x.timestamp)===key).forEach(x=>items.push({icon:"◎",title:`${getMerchant(x.uid)?.store_name||"Merchant"}`,detail:`Sales record · ${x.type} · ${x.status}`}));
    state.credits.filter(x=>dateKeyInZone(x.timestamp)===key).forEach(x=>items.push({icon:"$",title:`${getMerchant(x.uid)?.store_name||"Merchant"}`,detail:`Credit ${money2(x.amount)} · ${x.status}`}));
    state.followups.filter(f=>dateKeyInZone(f.createdAt)===key).forEach(f=>items.push({icon:"◫",title:`${getMerchant(f.uid)?.store_name||"Merchant"}`,detail:`Follow-up created · ${f.reason}`}));
    state.followups.filter(f=>f.completedAt&&dateKeyInZone(f.completedAt)===key).forEach(f=>items.push({icon:"✓",title:`${getMerchant(f.uid)?.store_name||"Merchant"}`,detail:`Follow-up completed · ${f.reason}`}));
    return items;
  }

  function renderLogs() {
    const tab = state.ui.logsTab || "calls";
    const tabs = [
      ["calls",`Call logs (${state.calls.length})`],
      ["photos",`Photo logs (${state.photos.length})`],
      ["sales",`Sales (${state.sales.length})`],
      ["credits",`Credits (${state.credits.length})`],
      ["unmatched",`Unmatched (${state.unmatchedCalls.length})`]
    ];
    return `<section class="panel">
      <div class="card-head"><div><div class="card-kicker">Operational ledger</div><h2>Logs and unmatched review</h2></div><button class="btn red" type="button" data-action="clearCurrentLogTab">Clear current tab</button></div>
      <div class="tabbar">${tabs.map(([id,label])=>`<button class="tab-btn ${tab===id?"active":""}" type="button" data-logs-tab="${id}">${esc(label)}</button>`).join("")}</div>
      ${tab === "photos" ? renderPhotoLogsTable() : tab === "sales" ? renderSalesLogsTable() : tab === "credits" ? renderCreditLogsTable() : tab === "unmatched" ? renderUnmatchedReview() : renderCallLogsTable()}
    </section>`;
  }

  function renderCallLogsTable() {
    const rows = state.calls.slice().sort((a,b)=>String(b.completedAt).localeCompare(String(a.completedAt)));
    if (!rows.length) return `<div class="empty-state"><strong>No call logs</strong><span>Import a Calls CSV or add a manual call in Work Hub.</span></div>`;
    return `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Merchant</th><th>State</th><th>Disposition</th><th>Real</th><th>Credited</th><th>Source</th><th>Note</th><th></th></tr></thead><tbody>${rows.map(c=>`<tr><td>${formatDateTime(c.completedAt)}</td><td><strong>${esc(getMerchant(c.uid)?.store_name || c.prospectCompany || "Unmatched")}</strong><span>${esc(c.matchMethod||"")}</span></td><td>${statusPill(c.state,c.state==="completed"?"green":c.state==="no_answer"?"orange":"red")}</td><td>${esc(c.disposition||"—")}</td><td>${mmss(c.durationSec)}</td><td>${mmss(c.creditedSec)}</td><td>${esc(c.source||"CSV")}</td><td>${esc(c.note||"—")}</td><td><button class="btn small red" type="button" data-delete-call="${attr(c.id)}">Delete</button></td></tr>`).join("")}</tbody></table></div>`;
  }

  function renderPhotoLogsTable() {
    const rows = state.photos.slice().sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));
    if (!rows.length) return `<div class="empty-state"><strong>No photo logs</strong><span>Photo updates recorded in Work Hub will appear here.</span></div>`;
    return `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Merchant</th><th>Photos</th><th>Coverage</th><th>Status</th><th>Source</th><th>Note</th><th>User</th><th></th></tr></thead><tbody>${rows.map(p=>`<tr><td>${formatDateTime(p.timestamp)}</td><td>${esc(getMerchant(p.uid)?.store_name||"Merchant")}</td><td>+${p.photosAdded}</td><td>${pct(p.coverageAfter)}</td><td>${esc(p.status||"—")}</td><td>${esc(p.source||"Manual")}</td><td>${esc(p.note||"—")}</td><td>${esc(p.user||state.profile.username||"Workspace user")}</td><td><button class="btn small red" type="button" data-delete-photo="${attr(p.id)}">Delete</button></td></tr>`).join("")}</tbody></table></div>`;
  }

  function renderSalesLogsTable() {
    const rows=state.sales.slice().sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));
    if(!rows.length) return `<div class="empty-state"><strong>No sales records</strong><span>Submit an ads or promotions record from Work Hub.</span></div>`;
    return `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Merchant</th><th>Type</th><th>Campaign</th><th>Status</th><th>Period</th><th>Reference</th><th>Note</th><th></th></tr></thead><tbody>${rows.map(x=>`<tr><td>${formatDateTime(x.timestamp)}</td><td>${esc(getMerchant(x.uid)?.store_name||"Merchant")}</td><td>${esc(x.type)}</td><td>${esc(x.campaign||"—")}</td><td>${esc(x.status)}</td><td>${esc(x.startDate||"—")} – ${esc(x.endDate||"—")}</td><td>${esc(x.reference||"—")}</td><td>${esc(x.note||"—")}</td><td><button class="btn small red" type="button" data-delete-sale="${attr(x.id)}">Delete</button></td></tr>`).join("")}</tbody></table></div>`;
  }

  function renderCreditLogsTable() {
    const rows=state.credits.slice().sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));
    if(!rows.length) return `<div class="empty-state"><strong>No credit records</strong><span>Submit a credit from Work Hub.</span></div>`;

  }

  function renderUnmatchedReview() {
    if (!state.unmatchedCalls.length) return `<div class="empty-state"><div class="icon">✓</div><strong>No unmatched calls</strong><span>Every imported call is assigned or the review queue is empty.</span></div>`;

    return `<div class="followup-list">${state.unmatchedCalls.map(u=>{

        <div class="followup-row-top"><strong>${esc(call.prospectCompany||call.prospectName||"Unknown call")}</strong><span class="pill orange">${esc(u.reason||"Review")}</span></div>
        <span>${formatDateTime(call.completedAt)} · ${esc(call.prospectEmail||call.prospectPhones.join(" / ")||"No contact data")}</span>
        <div class="form-grid" style="margin-top:9px"><div class="field c8"><label>Assign merchant</label><select data-unmatched-select="${attr(u.id)}"><option value="">Select merchant…</option>${merchants.map(m=>`<option value="${attr(m.uid)}" ${u.suggestions?.[0]===m.uid?"selected":""}>${esc(m.store_name)}${m.store_id?` · ${esc(m.store_id)}`:""}</option>`).join("")}</select></div><div class="field c4"><label>Action</label><button class="btn primary" type="button" data-assign-unmatched="${attr(u.id)}">Assign call</button></div></div>
        ${u.suggestions?.length?`<div class="button-row" style="margin-top:8px">${u.suggestions.slice(0,3).map(id=>`<button class="btn small ghost" type="button" data-quick-assign="${attr(u.id)}" data-merchant="${attr(id)}">${esc(getMerchant(id)?.store_name||"Suggestion")}</button>`).join("")}</div>`:""}
      </div>`;
    }).join("")}</div>`;

  function renderResources() {
    const filter = state.ui.resourceFilters || { q:"", type:"all", sort:"favorites" };
    const selected = state.resources.find(x => x.id === state.ui.resourceSelectedId) || null;
    const types = unique(state.resources.map(x => x.type || "Resource")).sort();
    let items = state.resources.filter(x => {
      const hay = normalizeText([x.name, x.type, x.accessLevel, x.creator, x.description, x.url].join(" "));
      return (!filter.q || hay.includes(normalizeText(filter.q))) && (filter.type === "all" || String(x.type || "Resource") === filter.type);
    });
    items.sort((a, b) => filter.sort === "name"
      ? a.name.localeCompare(b.name)
      : filter.sort === "type"
        ? String(a.type || "Resource").localeCompare(String(b.type || "Resource"))
        : (Number(b.favorite) - Number(a.favorite) || a.name.localeCompare(b.name)));

    return `<section class="panel">
      <div class="card-head"><div><div class="card-kicker">Resources</div><h2>Knowledge base and AI assistants</h2></div><button class="btn primary" type="button" data-action="newResource">New resource</button></div>
      <div class="toolbar" style="grid-template-columns:1.5fr .8fr .8fr auto"><div class="field"><label>Search</label><input id="resourceSearch" value="${attr(filter.q || "")}" placeholder="Name, creator, access level or URL…" /></div><div class="field"><label>Collection</label><select id="resourceType"><option value="all">All collections</option>${types.map(x => `<option ${filter.type === x ? "selected" : ""}>${esc(x)}</option>`).join("")}</select></div><div class="field"><label>Sort</label><select id="resourceSort"><option value="favorites" ${filter.sort === "favorites" ? "selected" : ""}>Favorites first</option><option value="name" ${filter.sort === "name" ? "selected" : ""}>Name</option><option value="type" ${filter.sort === "type" ? "selected" : ""}>Collection</option></select></div><button class="btn ghost" type="button" data-action="clearResourceFilters">Clear</button></div>
    </section>
    <div class="resource-layout">
      <section class="panel">
        <div class="card-head"><div><div class="card-kicker">Library</div><h3>${items.length} resources</h3></div></div>

  function renderLinks() {
    const filter = state.ui.linkFilters || { q:"", category:"all", sort:"favorites" };
    const selected = state.links.find(x => x.id === state.ui.linkSelectedId) || null;
    const categories = unique(state.links.map(x => x.category)).sort();
    let items = state.links.filter(x => {
      const hay = normalizeText([x.name, x.category, x.description, x.url].join(" "));
      return (!filter.q || hay.includes(normalizeText(filter.q))) && (filter.category === "all" || x.category === filter.category);
    });
    items.sort((a, b) => filter.sort === "recent"
      ? String(b.lastOpened || "").localeCompare(String(a.lastOpened || ""))
      : filter.sort === "usage"
        ? Number(b.uses || 0) - Number(a.uses || 0)
        : (Number(b.favorite) - Number(a.favorite) || a.name.localeCompare(b.name)));
    const pinned = items.filter(x => x.favorite).slice(0, 6);
    const grouped = Object.groupBy ? Object.groupBy(items, x => x.category) : items.reduce((a, x) => ((a[x.category] ||= []).push(x), a), {});
    return `<section class="panel">
      <div class="card-head"><div><div class="card-kicker">Links</div><h2>Systems and quick shortcuts</h2></div><button class="btn primary" type="button" data-action="newLink">New link</button></div>
      <div class="toolbar" style="grid-template-columns:1.5fr .8fr .8fr auto"><div class="field"><label>Search</label><input id="linkSearch" value="${attr(filter.q || "")}" placeholder="Name, category or URL…" /></div><div class="field"><label>Category</label><select id="linkCategory"><option value="all">All categories</option>${categories.map(x => `<option ${filter.category === x ? "selected" : ""}>${esc(x)}</option>`).join("")}</select></div><div class="field"><label>Sort</label><select id="linkSort"><option value="favorites" ${filter.sort === "favorites" ? "selected" : ""}>Favorites first</option><option value="recent" ${filter.sort === "recent" ? "selected" : ""}>Recently opened</option><option value="usage" ${filter.sort === "usage" ? "selected" : ""}>Most used</option></select></div><button class="btn ghost" type="button" data-action="clearLinkFilters">Clear</button></div>
    </section>
    <div class="resource-layout">
      <section class="panel">
        <div class="card-head"><div><div class="card-kicker">Pinned tools</div><h3>Your fastest shortcuts</h3></div><span class="pill">${pinned.length}</span></div>
        ${pinned.length ? `<div class="resource-grid">${pinned.map(x => renderResourceCard(x, "link")).join("")}</div>` : `<div class="empty-state" style="min-height:130px"><strong>No pinned tools</strong><span>Pin links to keep them at the top.</span></div>`}
        <div class="divider"></div>
        ${Object.keys(grouped).sort().map(category => `<div class="category-heading"><strong>${esc(category)}</strong><span>${grouped[category].length} links</span></div><div class="resource-grid">${grouped[category].map(x => renderResourceCard(x, "link")).join("")}</div>`).join("") || `<div class="empty-state"><strong>No links match</strong><span>Clear the filters or add a new link.</span></div>`}
      </section>
      <aside class="panel resource-editor">${renderLinkEditor(selected)}</aside>
    </div>`;
  }

  function renderResourceCard(item, kind) {
    const selectAttr = kind === "link" ? `data-select-link="${attr(item.id)}"` : `data-select-resource="${attr(item.id)}"`;
    const isLink = kind === "link";
    const title = esc(item.name);
    const subtitle = isLink ? esc(item.category || "Quick shortcut") : esc(item.description || "No description");
    const urlLabel = item.url ? esc(String(item.url).replace(/^https?:\/\//, "")) : "";
    return `<article class="resource-card ${isLink ? "resource-card-compact" : ""} ${(kind === "link" ? state.ui.linkSelectedId : state.ui.resourceSelectedId) === item.id ? "selected" : ""}" ${selectAttr}>
      <div class="resource-card-head">
        <div class="resource-icon">${esc(item.icon || item.emoji || "◇")}</div>
        <div><h3>${title}</h3><p>${subtitle}</p></div>
        <span class="pill ${item.favorite ? "orange" : ""}">${item.favorite ? "★" : "☆"}</span>
      </div>
      ${isLink ? `<div class="resource-meta-row">${item.category ? `<span class="pill">${esc(item.category)}</span>` : ""}${item.review ? `<span class="pill red">Review</span>` : ""}<span class="pill">${Number(item.uses || 0)} uses</span></div>` : `<div class="resource-meta-row">${item.type ? `<span class="pill blue">${esc(item.type)}</span>` : ""}${item.accessLevel ? `<span class="pill purple">${esc(item.accessLevel)}</span>` : ""}${item.creator ? `<span class="pill">${esc(item.creator)}</span>` : ""}</div>`}
      ${!isLink && item.url ? `<div class="url">${urlLabel}</div>` : ""}
      <div class="button-row"><button class="btn small ghost" type="button" data-copy="${attr(item.url || "")}">Copy</button>${isLink ? `<button class="btn small blue" type="button" data-open-link="${attr(item.id)}">Open</button>` : `${item.url ? `<a class="btn small blue" href="${attr(item.url)}" target="_blank" rel="noopener noreferrer">Open</a>` : ""}`}${item.review && isLink ? `<span class="pill red">Needs review</span>` : ""}</div>
    </article>`;
  }

  function workspaceHealth() {
    const active=state.merchants.filter(m=>!m.archived);
    const missingIds=active.filter(m=>!m.store_id).length;
    const missingTz=active.filter(m=>!m.timezone).length;
    const missingContacts=active.filter(m=>!splitMulti(m.dm_email).length&&!splitMulti(m.dm_phone).length).length;
    const duplicates=active.length-new Set(active.map(m=>m.store_id||m.uid)).size;
    return { active:active.length, missingIds, missingTz, missingContacts, duplicates, unmatched:state.unmatchedCalls.length };
  }

  function swatch(label,color){return `<div class="swatch"><div class="swatch-color" style="--swatch:${attr(color)}"></div><span>${esc(label)} · ${esc(color)}</span></div>`;}

  function bindViewSpecific() {
    const onInput = (id, fn, eventName="input") => {
      const el=document.getElementById(id); if(el) el.addEventListener(eventName,fn);
    };

    onInput("workHubSearch",e=>{state.ui.workHubPage=1;state.ui.workHubFilters={...(state.ui.workHubFilters||{}),q:e.target.value};debouncedRender();});
    ["workHubView","workHubMarket","workHubVideoFilter","workHubPhotoFilter","workHubContactFilter"].forEach(id=>onInput(id,()=>{state.ui.workHubPage=1;state.ui.workHubFilters=readWorkHubFilters();scheduleSave();renderApp();},"change"));

    onInput("merchantHasPhotos",e=>{const merchant=selectedMerchant();if(!merchant)return;setMerchantState(merchant.uid,{hasPhotos:e.target.checked});renderApp();},"change");
    onInput("merchantVideoInReview",e=>{const merchant=selectedMerchant();if(!merchant)return;setMerchantState(merchant.uid,{videoInReview:e.target.checked,videoStatus:e.target.checked?"In review":merchantState(merchant.uid).videoStatus});renderApp();},"change");
    onInput("merchantVideoStatus",e=>{const merchant=selectedMerchant();if(!merchant)return;setMerchantState(merchant.uid,{videoStatus:e.target.value,videoInReview:["In progress","In review"].includes(e.target.value)});renderApp();},"change");
    onInput("merchantPhotoReviewStatus",e=>{const merchant=selectedMerchant();if(!merchant)return;setMerchantState(merchant.uid,{photoReviewStatus:e.target.value,hasPhotos:e.target.value==="Approved"||merchantState(merchant.uid).hasPhotos});renderApp();},"change");
    onInput("merchantContactStatus",e=>{const merchant=selectedMerchant();if(!merchant)return;setMerchantState(merchant.uid,{contactStatus:e.target.value});renderApp();},"change");

    onInput("promoType",handlePromoTypeSelection,"change");
    ["adWeeklyBudget","adWeeklyBudgetRange","adCostPerOrder","adCostPerOrderRange"].forEach(id=>{
      onInput(id,()=>updateAdCalculator(id,false),"input");
      onInput(id,()=>updateAdCalculator(id,true),"change");
    });

    onInput("profileMerchantSelect",e=>selectMerchant(e.target.value),"change");

    ["followupFilterMerchant","followupFilterReason","followupFilterStatus"].forEach(id=>onInput(id,()=>{state.ui.followupFilters={merchant:document.getElementById("followupFilterMerchant")?.value||"all",reason:document.getElementById("followupFilterReason")?.value||"all",status:document.getElementById("followupFilterStatus")?.value||"open"};scheduleSave();renderApp();},"change"));

    onInput("resourceSearch",e=>{state.ui.resourceFilters={...(state.ui.resourceFilters||{}),q:e.target.value,type:document.getElementById("resourceType")?.value||"all",sort:document.getElementById("resourceSort")?.value||"favorites"};debouncedRender();});
    ["resourceType","resourceSort"].forEach(id=>onInput(id,()=>{state.ui.resourceFilters={q:document.getElementById("resourceSearch")?.value||"",type:document.getElementById("resourceType")?.value||"all",sort:document.getElementById("resourceSort")?.value||"favorites"};scheduleSave();renderApp();},"change"));

    onInput("linkSearch",e=>{state.ui.linkFilters={...(state.ui.linkFilters||{}),q:e.target.value,category:document.getElementById("linkCategory")?.value||"all",sort:document.getElementById("linkSort")?.value||"favorites"};debouncedRender();});
    ["linkCategory","linkSort"].forEach(id=>onInput(id,()=>{state.ui.linkFilters={q:document.getElementById("linkSearch")?.value||"",category:document.getElementById("linkCategory")?.value||"all",sort:document.getElementById("linkSort")?.value||"favorites"};scheduleSave();renderApp();},"change"));

    document.querySelectorAll("[data-followup-drag]").forEach(el=>el.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",el.dataset.followupDrag);e.dataTransfer.effectAllowed="move";}));
    document.querySelectorAll("[data-drop-date]").forEach(el=>{
      el.addEventListener("dragover",e=>{e.preventDefault();el.classList.add("drag-over");});
      el.addEventListener("dragleave",()=>el.classList.remove("drag-over"));
      el.addEventListener("drop",e=>{e.preventDefault();el.classList.remove("drag-over");const id=e.dataTransfer.getData("text/plain");moveFollowup(id,el.dataset.dropDate,el.dataset.dropTime||"");});
    });

    document.querySelectorAll("[data-drop-kind]").forEach(el=>{

  function setSelectedStatus(status) {
    const merchant=selectedMerchant();if(!merchant)return;
    if(status === "Active") {
      const key=String(merchant.uid);
      const current={...merchantState(key)};
      delete current.status;
      delete current.statusDate;
      current.updatedAt=new Date().toISOString();
      const meaningful=Object.keys(current).filter(k=>k!=="updatedAt");
      if(meaningful.length) state.merchantStates[key]=current;
      else delete state.merchantStates[key];
      scheduleSave();
      renderApp();
      toast("Merchant returned to Active / Auto routing");
      return;
    }
    const patch={status,statusDate:status==="Called"?dateKeyInZone(new Date()):""};
    setMerchantState(merchant.uid,patch);
    renderApp();
    toast(`Status updated: ${status}`);
  }

  function saveFollowup() {
    const requestedId=String(document.getElementById("followupId")?.value||"").trim();
    const uidValue=document.getElementById("followupMerchant")?.value||"";
    if(!uidValue)return toast("Select a merchant");
    const date=document.getElementById("followupDate")?.value||dateKeyInZone(new Date());
    const time=document.getElementById("followupTime")?.value||"10:00";
    const status=document.getElementById("followupStatus")?.value||"Pending";
    const existing=requestedId?state.followups.find(f=>String(f.id)===requestedId):null;
    const isEditing=!!existing;
    const wasCompleted=existing?.status==="Completed";
    const now=new Date().toISOString();
    const record={
      id:isEditing?existing.id:createUniqueFollowupId(),
      uid:uidValue,
      date,
      time,
      reason:document.getElementById("followupReason")?.value||"General Follow-up",
      priority:document.getElementById("followupPriority")?.value||"Medium",
      status,
      notes:document.getElementById("followupNotes")?.value.trim()||"",
      createdAt:existing?.createdAt||now,
      updatedAt:now,
      completedAt:status==="Completed"?(existing?.completedAt||now):""
    };

    if(isEditing) {
      Object.assign(existing,record);
      state.ui.selectedFollowupId=record.id;
    } else {
      state.followups=[...state.followups,record];
      state.selectedUid=uidValue;
      state.ui.selectedFollowupId="";
      state.ui.followupDraftDate=date;
      state.ui.followupDraftTime=time;
    }
    state.ui.followupAnchor=localDateFromKey(date).toISOString();
    scheduleSave();renderApp();
    if(status==="Completed"&&!wasCompleted){playFollowupCompleteSound();celebrate();}
    toast(isEditing?"Follow-up updated":"Follow-up created · ready for another");
  }

  function navigateFollowup(direction) {

  function dailySummaryText(key) {
    const s=dayStats(key);
    const risk=sortedPriorityMerchants(localDateFromKey(key)).filter(x=>x.lane==="High GMV + Critical Coverage"||x.lane==="Needs Follow-up").slice(0,10);
    return [
      `DASHWORK DAILY CLOSE — ${key}`,
      `Credited time: ${mmss(s.creditedSec)}`,
      `Real talk time: ${mmss(s.realSec)}`,
      `Call attempts: ${s.attempts}`,
      `Merchants called: ${s.merchantsCalled}`,
      `Photos added: ${s.photosAdded}`,
      `Follow-ups created: ${s.createdFollowups.length}`,
      `Follow-ups completed: ${s.completedFollowups.length}`,
      `Stores touched: ${s.touched}`,
      `GMV touched: ${money(s.gmvTouched)}`,
      `Merchants at risk: ${risk.length}`,
      ...risk.map(x=>`- ${x.merchant.store_name}: ${x.reason}`)
    ].join("\n");
  }

  function dailySummaryCsv(key) {
    const s=dayStats(key);
    const rows=[
      ["Date","Credited Seconds","Real Seconds","Call Attempts","Merchants Called","Photos Added","Follow-ups Created","Follow-ups Completed","Stores Touched","GMV Touched"],
      [key,s.creditedSec,s.realSec,s.attempts,s.merchantsCalled,s.photosAdded,s.createdFollowups.length,s.completedFollowups.length,s.touched,s.gmvTouched]
    ];
    return rows.map(r=>r.map(csvEscape).join(",")).join("\n");
  }

  function downloadWeekCsv(){

  function downloadMonthlyActivity(){
    const anchor=new Date(state.ui.activityAnchor||new Date());const first=new Date(anchor.getFullYear(),anchor.getMonth(),1,12),last=new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);const rows=[["Date","Credited Seconds","Real Seconds","Calls","Photos","Stores","Follow-ups","GMV Touched"]];for(let d=new Date(first);d<=last;d=addDays(d,1)){const x=dayStats(toISODate(d));rows.push([x.dateKey,x.creditedSec,x.realSec,x.attempts,x.photosAdded,x.touched,x.createdFollowups.length,x.gmvTouched]);}downloadFile(`dashwork-month-${anchor.getFullYear()}-${String(anchor.getMonth()+1).padStart(2,"0")}.csv`,rows.map(r=>r.map(csvEscape).join(",")).join("\n"),"text/csv");

  function clearCurrentLogTab() {
    const tab=state.ui.logsTab||"calls";
    if(!confirm(`Clear all ${tab} records? This cannot be undone.`))return;
    if(tab==="unmatched"){state.unmatchedCalls=[];}
    else if(["calls","photos","sales","credits"].includes(tab)){state[tab]=[];if(tab==="calls")state.unmatchedCalls=[];}
    scheduleSave();renderApp();toast(`${tab} cleared`);
  }

  function assignUnmatchedFromSelect(unmatchedId) {
    const select=document.querySelector(`[data-unmatched-select="${CSS.escape(unmatchedId)}"]`);
    if(!select?.value)return toast("Select a merchant");
    assignUnmatched(unmatchedId,select.value);
  }

  function assignUnmatched(unmatchedId,merchantId) {
    const row=state.unmatchedCalls.find(x=>x.id===unmatchedId);const call=state.calls.find(x=>x.id===row?.callId);const merchant=getMerchant(merchantId);
    if(!row||!call||!merchant)return toast("Assignment could not be completed");
    call.uid=merchant.uid;call.matchMethod="manual review";call.matchConfidence=100;state.unmatchedCalls=state.unmatchedCalls.filter(x=>x.id!==unmatchedId);scheduleSave();renderApp();toast(`Call assigned to ${merchant.store_name}`);
  }

  function normalizeUrl(url) {
    const value=String(url||"").trim();
    if(!value)return "";
    if(/^https?:\/\//i.test(value))return value;
    return `https://${value.replace(/^\/+/,"")}`;
  }

  function saveResource() {
    const id=document.getElementById("resourceEditId")?.value||"";
    const name=document.getElementById("resourceEditName")?.value.trim()||"";
    if(!name)return toast("Enter a resource name");
    const existing=state.resources.find(x=>x.id===id);
    const record={id:id||uid("resource"),name,type:document.getElementById("resourceEditType")?.value.trim()||"Guide",emoji:document.getElementById("resourceEditEmoji")?.value.trim()||"◇",accessLevel:document.getElementById("resourceEditAccessLevel")?.value.trim()||"",creator:document.getElementById("resourceEditCreator")?.value.trim()||"",url:normalizeUrl(document.getElementById("resourceEditUrl")?.value),description:document.getElementById("resourceEditDescription")?.value.trim()||"",favorite:existing?.favorite||false,createdAt:existing?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
    if(existing)Object.assign(existing,record);else state.resources.push(record);state.ui.resourceSelectedId=record.id;scheduleSave();renderApp();toast("Resource saved");
  }
  function toggleResourceFavorite(){const x=state.resources.find(r=>r.id===state.ui.resourceSelectedId);if(!x)return toast("Select a resource");x.favorite=!x.favorite;scheduleSave();renderApp();}
  function deleteResource(){const id=state.ui.resourceSelectedId;if(!id)return;if(!confirm("Delete this resource?"))return;state.resources=state.resources.filter(x=>x.id!==id);state.ui.resourceSelectedId="";scheduleSave();renderApp();toast("Resource deleted");}

  async function handleCsvFile(file,kind) {
    if(!file||!/\.csv$/i.test(file.name))return toast("Choose a CSV file");
    try{
      const text=await file.text();
      const result=kind==="merchants"?importMerchantsText(text,file.name):importCallsText(text,file.name);
      openModal(`${kind==="merchants"?"Merchant":"Call"} import complete`,file.name,`<div class="bento-grid">${Object.entries(result).map(([k,v])=>miniMetric(k.replace(/([A-Z])/g," $1"),typeof v==="number"?v.toLocaleString():v,"span-4")).join("")}</div><div class="button-row" style="margin-top:12px"><button class="btn primary" type="button" onclick="closeModal()">Continue</button>${kind==="calls"&&result.unmatched?`<button class="btn orange" type="button" onclick="closeModal();state.currentView='logs';state.ui.logsTab='unmatched';renderApp()">Review unmatched</button>`:""}</div>`);
    }catch(err){console.error(err);toast(err.message||"Import failed",4200);}
  }

  async function processProfileImage(file) {
    if(!file?.type.startsWith("image/"))return toast("Choose an image file");
    if(file.size>4_000_000)return toast("Use an image smaller than 4 MB");
    const dataUrl=await fileToDataUrl(file);state.profile.avatar=dataUrl;
    try{const colors=await extractPalette(dataUrl);state.profile.accent=colors[0];state.profile.accent2=colors[1];state.profile.palettePreset="custom";}catch(err){console.warn(err);}
    scheduleSave();renderApp();toast("Profile photo and palette updated");
  }
  function fileToDataUrl(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>reject(r.error);r.readAsDataURL(file);});}
  function extractPalette(dataUrl){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>{const canvas=document.createElement("canvas"),ctx=canvas.getContext("2d",{willReadFrequently:true});canvas.width=48;canvas.height=48;ctx.drawImage(img,0,0,48,48);const data=ctx.getImageData(0,0,48,48).data;const buckets=new Map();for(let i=0;i<data.length;i+=16){const a=data[i+3];if(a<180)continue;let r=data[i],g=data[i+1],b=data[i+2];const lum=.2126*r+.7152*g+.0722*b;if(lum<30||lum>235)continue;r=Math.round(r/32)*32;g=Math.round(g/32)*32;b=Math.round(b/32)*32;const key=`${r},${g},${b}`;buckets.set(key,(buckets.get(key)||0)+1);}const colors=[...buckets.entries()].sort((a,b)=>b[1]-a[1]).map(([k])=>`#${k.split(",").map(n=>clamp(Number(n),0,255).toString(16).padStart(2,"0")).join("")}`);resolve([colors[0]||"#8b5cf6",colors.find(c=>colorDistance(c,colors[0])>90)||colors[1]||"#2563eb"]);};img.onerror=reject;img.src=dataUrl;});}
  function colorDistance(a,b){const x=hexToRgb(a),y=hexToRgb(b);return Math.hypot(x[0]-y[0],x[1]-y[1],x[2]-y[2]);}

  async function requestNotifications() {
    if(!("Notification" in window))return toast("This browser does not support notifications");
    const permission=await Notification.requestPermission();state.settings.notificationsEnabled=permission==="granted";scheduleSave();renderApp();toast(permission==="granted"?"Notifications enabled":"Notification permission was not granted");
  }

  function checkFollowupNotifications() {
    if(!state.settings.notificationsEnabled||!("Notification" in window)||Notification.permission!=="granted")return;
    const now=new Date(),today=dateKeyInZone(now),current=now.getHours()*60+now.getMinutes();
    state.followups.filter(f=>f.status!=="Completed"&&f.date<=today).forEach(f=>{
      const [h,m]=String(f.time||"09:00").split(":").map(Number);const dueMin=h*60+m;const key=`${f.id}_${f.date}_${f.time}`;
      const should=f.date<today||(f.date===today&&current>=dueMin-10);
      if(should&&!state.notifiedFollowups[key]){
        const merchant=getMerchant(f.uid);new Notification("DASHWORK follow-up",{body:`${merchant?.store_name||"Merchant"} · ${f.reason} · ${f.date} ${f.time||""}`});state.notifiedFollowups[key]=new Date().toISOString();scheduleSave();
      }
    });
  }
