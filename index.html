<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2718%27 fill=%27%232563eb%27/%3E%3Cpath d=%27M18 15h13c11 0 18 6 18 17S42 49 31 49H18V15zm13 25c6 0 9-3 9-8s-3-8-9-8h-4v16h4z%27 fill=%27white%27/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #070a12;
      --bg-2: #0a0f1d;
      --surface: #0e1524;
      --surface-2: #121b2d;
      --card: #111a2a;
      --card-2: #162139;
      --text: #f6f7fb;
      --muted: #9da9bd;
      --muted-2: #6f7b90;
      --line: rgba(148, 163, 184, .18);
      --line-strong: rgba(148, 163, 184, .30);
      --accent: #8b5cf6;
      --accent-rgb: 139, 92, 246;
      --accent-2: #2563eb;
      --accent-2-rgb: 37, 99, 235;
      --cyan: #22d3ee;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --radius: 20px;
      --radius-sm: 14px;
      --shadow: 0 24px 70px rgba(0, 0, 0, .28);
      --sidebar: 252px;
      --sidebar-collapsed: 78px;
      --motion: 220ms;
      --ease: cubic-bezier(.2,.8,.2,1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, rgba(var(--accent-2-rgb), .18), transparent 30%),
        radial-gradient(circle at 92% 2%, rgba(var(--accent-rgb), .14), transparent 28%),
        var(--bg);
      overflow-x: hidden;
    }
    body[data-motion="minimal"] { --motion: 70ms; }
    body[data-motion="full"] { --motion: 360ms; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }
    img { max-width: 100%; }
    ::selection { background: rgba(var(--accent-rgb), .35); color: white; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,.24); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      transition: grid-template-columns var(--motion) var(--ease);
    }
    body.sidebar-collapsed .app-shell { grid-template-columns: var(--sidebar-collapsed) minmax(0, 1fr); }

    .sidebar {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 100vh;
      overflow: auto;
      padding: 16px 12px;
      border-right: 1px solid var(--line);
      background: rgba(8, 13, 24, .92);
      backdrop-filter: blur(18px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(var(--accent-2-rgb), .14), rgba(var(--accent-rgb), .09)), var(--surface);
      min-height: 68px;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 950;
      letter-spacing: -.07em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
      overflow: hidden;
    }
    .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
    .brand-copy { min-width: 0; }
    .brand-copy strong { display: block; font-size: 16px; letter-spacing: -.035em; }
    .brand-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; line-height: 1.2; }
    .side-collapse {
      width: 100%;
      height: 38px;
      margin: 10px 0 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--surface);
      color: var(--muted);
      font-weight: 850;
    }
    .side-profile {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(17, 26, 42, .68);
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(var(--accent-rgb), .55), rgba(var(--accent-2-rgb), .55));
      border: 1px solid rgba(255,255,255,.13);
      font-weight: 900;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .side-profile strong { display: block; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-profile span { display: block; margin-top: 2px; color: var(--muted); font-size: 10px; }
    .nav-label-heading {
      margin: 14px 8px 7px;
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .nav-list { display: grid; gap: 4px; }
    .nav-btn {
      width: 100%;
      min-height: 44px;
      display: grid;
      grid-template-columns: 30px minmax(0,1fr) auto;
      gap: 9px;
      align-items: center;
      padding: 7px 9px;
      border: 1px solid transparent;
      border-radius: 14px;
      color: #cbd5e1;
      background: transparent;
      text-align: left;
      transition: transform var(--motion) var(--ease), background var(--motion), border-color var(--motion), color var(--motion);
    }
    .nav-btn:hover { transform: translateX(2px); background: rgba(148,163,184,.07); border-color: var(--line); }
    .nav-btn.active {
      background: linear-gradient(90deg, rgba(var(--accent-rgb), .22), rgba(var(--accent-2-rgb), .12));
      border-color: rgba(var(--accent-rgb), .40);
      color: white;
    }
    .nav-icon {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(148,163,184,.08);
      border: 1px solid var(--line);
      font-size: 15px;
    }
    .nav-btn.active .nav-icon { background: rgba(var(--accent-rgb), .30); border-color: rgba(var(--accent-rgb), .45); }
    .nav-text { min-width: 0; font-size: 12px; font-weight: 820; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-count { min-width: 26px; padding: 2px 7px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); font-size: 10px; text-align: center; }

    body.sidebar-collapsed .brand-copy,
    body.sidebar-collapsed .side-profile > div:last-child,
    body.sidebar-collapsed .nav-label-heading,
    body.sidebar-collapsed .nav-text,
    body.sidebar-collapsed .nav-count,
    body.sidebar-collapsed .collapse-copy { display: none; }
    body.sidebar-collapsed .brand { justify-content: center; padding: 10px 6px; }
    body.sidebar-collapsed .brand-mark { width: 42px; height: 42px; flex-basis: 42px; }
    body.sidebar-collapsed .side-profile { grid-template-columns: 1fr; justify-items: center; padding: 8px; }
    body.sidebar-collapsed .nav-btn { grid-template-columns: 1fr; justify-items: center; padding: 7px; }
    body.sidebar-collapsed .nav-icon { width: 36px; height: 36px; }

    .workspace { min-width: 0; padding: 18px clamp(14px, 2.1vw, 32px) 42px; }
    .topbar {
      position: sticky;
      top: 10px;
      z-index: 40;
      min-height: 70px;
      display: grid;
      grid-template-columns: minmax(220px, .8fr) minmax(300px, 1.35fr) auto;
      gap: 14px;
      align-items: center;
      padding: 11px 13px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(10, 15, 29, .88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }
    .page-heading { min-width: 0; padding-left: 5px; }
    .page-heading .eyebrow { color: var(--cyan); font-size: 10px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
    .page-heading h1 { margin: 3px 0 0; font-size: 21px; line-height: 1.1; letter-spacing: -.045em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .global-search { position: relative; }
    .global-search input {
      width: 100%;
      height: 46px;
      padding: 0 44px 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 15px;
      color: var(--text);
      background: rgba(17, 26, 42, .90);
      outline: none;
    }
    .global-search input:focus { border-color: rgba(var(--accent-2-rgb), .72); box-shadow: 0 0 0 4px rgba(var(--accent-2-rgb), .12); }
    .global-search::after { content: "⌕"; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 20px; pointer-events: none; }
    .search-results {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      max-height: 420px;
      overflow: auto;
      padding: 7px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: #0c1424;
      box-shadow: 0 28px 90px rgba(0,0,0,.52);
    }
    .search-results.show { display: grid; gap: 5px; }
    .search-result {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }
    .search-result:hover { border-color: var(--line); background: rgba(148,163,184,.08); }
    .search-result strong { display: block; font-size: 12px; }
    .search-result span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; }
    .search-result em { align-self: center; font-style: normal; color: var(--muted); font-size: 10px; }
    .top-actions { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
    .local-clock { min-width: 88px; text-align: right; }
    .local-clock strong { display: block; font-size: 13px; font-variant-numeric: tabular-nums; }
    .local-clock span { display: block; margin-top: 2px; color: var(--muted); font-size: 9px; }
    .top-avatar { width: 42px; height: 42px; border-radius: 14px; }

    .view-enter { animation: viewEnter var(--motion) var(--ease) both; }
    @keyframes viewEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .panel, .bento-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(155deg, rgba(255,255,255,.025), transparent 42%), rgba(14, 21, 36, .90);
      box-shadow: 0 15px 44px rgba(0,0,0,.18);
    }
    .panel { padding: 16px; margin-bottom: 14px; }
    .bento-card { padding: 16px; min-width: 0; position: relative; overflow: hidden; }
    .bento-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 100% 0, rgba(var(--accent-rgb), .10), transparent 36%);
      opacity: .75;
    }
    .bento-card > * { position: relative; z-index: 1; }
    .bento-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 13px; }
    .span-12 { grid-column: span 12; }
    .span-9 { grid-column: span 9; }
    .span-8 { grid-column: span 8; }
    .span-7 { grid-column: span 7; }
    .span-6 { grid-column: span 6; }
    .span-5 { grid-column: span 5; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }
    .row-2 { grid-row: span 2; }
    .card-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 13px; }
    .card-kicker { color: var(--muted); font-size: 10px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
    .card-head h2, .card-head h3 { margin: 3px 0 0; letter-spacing: -.035em; line-height: 1.12; }
    .card-head h2 { font-size: 22px; }
    .card-head h3 { font-size: 15px; }
    .card-hint { max-width: 360px; color: var(--muted); font-size: 11px; line-height: 1.45; text-align: right; }
    .divider { height: 1px; background: var(--line); margin: 13px 0; }

    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(17, 26, 42, .82);
      color: var(--text);
      font-size: 11px;
      font-weight: 850;
      text-decoration: none;
      transition: transform var(--motion) var(--ease), border-color var(--motion), background var(--motion), filter var(--motion);
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(148,163,184,.46); filter: brightness(1.08); }
    .btn:active { transform: translateY(1px) scale(.985); }
    .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: rgba(255,255,255,.18); color: white; }
    .btn.blue { background: rgba(var(--accent-2-rgb), .20); border-color: rgba(var(--accent-2-rgb), .50); color: #dbeafe; }
    .btn.purple { background: rgba(var(--accent-rgb), .18); border-color: rgba(var(--accent-rgb), .48); color: #ede9fe; }
    .btn.green { background: rgba(34,197,94,.14); border-color: rgba(34,197,94,.42); color: #bbf7d0; }
    .btn.orange { background: rgba(245,158,11,.14); border-color: rgba(245,158,11,.42); color: #fde68a; }
    .btn.red { background: rgba(239,68,68,.14); border-color: rgba(239,68,68,.42); color: #fecaca; }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 31px; padding: 6px 9px; font-size: 10px; }
    .btn.square { width: 38px; padding: 0; border-radius: 13px; }
    .btn[disabled] { opacity: .45; cursor: not-allowed; transform: none; }
    .button-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(148,163,184,.07);
      color: #d4dbea;
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
    }
    .pill.green { background: rgba(34,197,94,.11); border-color: rgba(34,197,94,.34); color: #86efac; }
    .pill.orange { background: rgba(245,158,11,.11); border-color: rgba(245,158,11,.34); color: #fcd34d; }
    .pill.red { background: rgba(239,68,68,.11); border-color: rgba(239,68,68,.34); color: #fca5a5; }
    .pill.blue { background: rgba(var(--accent-2-rgb), .12); border-color: rgba(var(--accent-2-rgb), .38); color: #bfdbfe; }
    .pill.purple { background: rgba(var(--accent-rgb), .12); border-color: rgba(var(--accent-rgb), .38); color: #ddd6fe; }
    .status-dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; }

    .field { display: grid; gap: 6px; min-width: 0; }
    .field label { color: var(--muted); font-size: 10px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    .field input, .field select, .field textarea {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: rgba(8, 15, 29, .82);
      color: var(--text);
      outline: none;
    }
    .field textarea { min-height: 92px; resize: vertical; line-height: 1.45; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: rgba(var(--accent-2-rgb), .70); box-shadow: 0 0 0 4px rgba(var(--accent-2-rgb), .10); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted-2); }
    .form-grid { display: grid; grid-template-columns: repeat(12, minmax(0,1fr)); gap: 10px; }
    .field.c12 { grid-column: span 12; }
    .field.c8 { grid-column: span 8; }
    .field.c6 { grid-column: span 6; }
    .field.c4 { grid-column: span 4; }
    .field.c3 { grid-column: span 3; }

    .metric-value { margin-top: 8px; font-size: 28px; font-weight: 950; letter-spacing: -.055em; font-variant-numeric: tabular-nums; }
    .metric-sub { margin-top: 5px; color: var(--muted); font-size: 11px; line-height: 1.4; }
    .progress { height: 7px; margin-top: 11px; border-radius: 999px; overflow: hidden; background: rgba(148,163,184,.10); }
    .progress > span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 520ms var(--ease); }
    .progress.green > span { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .progress.orange > span { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .progress.red > span { background: linear-gradient(90deg, #dc2626, #fb7185); }

    .focus-actions { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 9px; }
    .focus-action {
      min-height: 82px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      background: rgba(17, 26, 42, .68);
      text-align: left;
    }
    .focus-action:hover { border-color: rgba(var(--accent-rgb), .45); background: rgba(var(--accent-rgb), .09); }
    .focus-action span:first-child { font-size: 18px; }
    .focus-action strong { display: block; font-size: 11px; }
    .focus-action small { display: block; margin-top: 3px; color: var(--muted); font-size: 9px; }

    .goal-wrap { display: grid; place-items: center; padding: 5px 0 1px; }
    .goal-ring {
      width: 150px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--pct, 0%), rgba(148,163,184,.10) 0);
      position: relative;
    }
    .goal-ring::after { content: ""; position: absolute; inset: 13px; border-radius: 50%; background: var(--surface); border: 1px solid var(--line); }
    .goal-ring > div { position: relative; z-index: 2; text-align: center; }
    .goal-ring strong { display: block; font-size: 27px; letter-spacing: -.05em; }
    .goal-ring span { display: block; margin-top: 2px; color: var(--muted); font-size: 10px; }

    .merchant-list { display: grid; gap: 8px; }
    .merchant-row {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(17, 26, 42, .66);
      color: var(--text);
      text-align: left;
      transition: transform var(--motion) var(--ease), border-color var(--motion), background var(--motion);
    }
    .merchant-row:hover { transform: translateY(-1px); border-color: rgba(var(--accent-2-rgb), .45); background: rgba(var(--accent-2-rgb), .08); }
    .merchant-row.selected { outline: 2px solid rgba(var(--accent-rgb), .48); border-color: rgba(var(--accent-rgb), .48); }
    .merchant-row strong { display: block; font-size: 12px; line-height: 1.25; }
    .merchant-row .meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .merchant-row .score { text-align: right; }
    .merchant-row .score b { display: block; font-size: 15px; }
    .merchant-row .score span { display: block; margin-top: 3px; color: var(--muted); font-size: 9px; }

    .timezone-mini { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; }
    .zone-card { padding: 11px; border: 1px solid var(--line); border-radius: 15px; background: rgba(17,26,42,.62); }
    .zone-card strong { display: block; margin-top: 6px; font-size: 17px; font-variant-numeric: tabular-nums; }
    .zone-card span { color: var(--muted); font-size: 9px; }

    .chart-wrap { min-height: 190px; display: grid; align-items: end; }
    .chart-svg { width: 100%; height: 180px; overflow: visible; }
    .chart-grid-line { stroke: rgba(148,163,184,.13); stroke-width: 1; }
    .chart-area { fill: url(#areaGradient); opacity: .58; }
    .chart-line { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
    .chart-dot { fill: var(--accent-2); stroke: var(--surface); stroke-width: 3; }
    .chart-label { fill: var(--muted); font-size: 9px; }

    .toolbar { display: grid; grid-template-columns: minmax(240px,1.4fr) repeat(3,minmax(160px,.7fr)) auto; gap: 10px; align-items: end; }
    .lane-grid { display: grid; grid-template-columns: repeat(3,minmax(270px,1fr)); gap: 12px; align-items: start; }
    .lane { padding: 0; overflow: hidden; min-height: 122px; }
    .lane-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
    }
    .lane-toggle:hover { background: rgba(148,163,184,.05); }
    .lane-toggle strong { display: block; font-size: 14px; letter-spacing: -.025em; }

  function openDatabase() {
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) return resolve(null);
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const database = req.result;
        if (!database.objectStoreNames.contains(DB_STORE)) database.createObjectStore(DB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbRead(key) {
    return new Promise((resolve) => {
      if (!db) {
        try { resolve(JSON.parse(localStorage.getItem(key) || "null")); } catch { resolve(null); }
        return;
      }
      const tx = db.transaction(DB_STORE, "readonly");
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = () => resolve(req.result ?? null);
      req.onerror = () => resolve(null);
    });
  }

  function dbWrite(key, value) {
    return new Promise((resolve) => {
      if (!db) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch (err) { console.warn(err); }
        resolve();
        return;
      }
      const tx = db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  }

      settings: { ...base.settings, ...(saved.settings || {}) },
      ui: { ...base.ui, ...(saved.ui || {}) },

  function esc(value) {
    return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
  }

  function attr(value) { return esc(value).replace(/`/g, "&#096;"); }
  function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }
  function normalizeText(value) {
    return String(value ?? "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
  }
  function normalizeHeader(value) { return String(value ?? "").trim().toLowerCase().replace(/\s+/g, " "); }

  function cleanStoreId(value) {
    const s = String(value ?? "").trim();
    if (!s || /^(link|nan|null|undefined)$/i.test(s)) return "";

  function numberValue(value) {
    const n = Number(String(value ?? "").replace(/[$,%\s,]/g, ""));
    return Number.isFinite(n) ? n : null;
  }
  function percentValue(value) {
    const n = numberValue(value);
    return n == null ? null : clamp(n, 0, 100);
  }
  function money(value) {
    if (value == null || !Number.isFinite(Number(value))) return "—";
    return new Intl.NumberFormat("en-CA", { style: "currency", currency: "CAD", maximumFractionDigits: 0 }).format(Number(value));
  }
  function money2(value) {
    if (value == null || !Number.isFinite(Number(value))) return "—";
    return new Intl.NumberFormat("en-CA", { style: "currency", currency: "CAD", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(value));

  function pct(value) { return value == null || !Number.isFinite(Number(value)) ? "—" : `${Number(value).toFixed(2)}%`; }
  function mmss(seconds) {
    const sec = Math.max(0, Math.round(Number(seconds) || 0));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
  function minutesLabel(seconds) {
    const total = Math.round((Number(seconds) || 0) / 60);
    const h = Math.floor(total / 60);
    const m = total % 60;
    return h ? `${h}h ${m}m` : `${m}m`;
  }
  function toISODate(date = new Date()) {
    const d = new Date(date);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  function dateKeyInZone(date, timeZone = state.settings.userTz) {
    const d = new Date(date);
    if (Number.isNaN(d.getTime())) return "";
    const parts = new Intl.DateTimeFormat("en-CA", { timeZone, year:"numeric", month:"2-digit", day:"2-digit" }).formatToParts(d);
    const get = type => parts.find(x => x.type === type)?.value || "";
    return `${get("year")}-${get("month")}-${get("day")}`;
  }
  function localDateFromKey(key) {
    const [y,m,d] = String(key || "").split("-").map(Number);
    return new Date(y || 1970, (m || 1) - 1, d || 1, 12, 0, 0);
  }
  function formatDate(value, options = {}) {
    const d = value instanceof Date ? value : new Date(value);
    if (Number.isNaN(d.getTime())) return String(value || "—");
    return new Intl.DateTimeFormat("en-US", { month:"short", day:"numeric", year:"numeric", ...options }).format(d);
  }
  function formatDateTime(value) {
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return String(value || "—");
    return new Intl.DateTimeFormat("en-US", { month:"short", day:"numeric", year:"numeric", hour:"numeric", minute:"2-digit" }).format(d);
  }
  function isSameDay(a, b) { return toISODate(a) === toISODate(b); }
  function startOfDay(date) { const d = new Date(date); d.setHours(0,0,0,0); return d; }
  function addDays(date, amount) { const d = new Date(date); d.setDate(d.getDate() + amount); return d; }
  function daysBetween(a, b) { return Math.floor((startOfDay(b) - startOfDay(a)) / 86400000); }
  function splitMulti(value) { return String(value || "").split(/\s*\|\|\s*/).map(x => x.trim()).filter(Boolean); }

  function canonicalTz(value) { return TIMEZONE_ALIASES[value] || value || ""; }
  function safeIntl(timeZone, options, date = new Date()) {
    try { return new Intl.DateTimeFormat("en-US", { timeZone, ...options }).format(date); }
    catch { return "—"; }
  }
  function parseTimeMinutes(value, fallback = 0) {
    const [h,m] = String(value || "").split(":").map(Number);
    return Number.isFinite(h) && Number.isFinite(m) ? h * 60 + m : fallback;
  }
  function merchantLocalStatus(merchant, now = new Date()) {
    const zone = canonicalTz(merchant?.timezone);
    if (!zone) return { label:"Missing timezone", cls:"orange", time:"—", date:"—", safe:false, zone:"" };
    try {
      const weekday = safeIntl(zone, { weekday:"short" }, now);
      const time24 = safeIntl(zone, { hour:"2-digit", minute:"2-digit", hour12:false }, now);
      const [h,m] = time24.split(":").map(Number);
      const current = h * 60 + m;
      const start = parseTimeMinutes(state.settings.safeStart, 540);
      const end = parseTimeMinutes(state.settings.safeEnd, 1200);
      const weekend = ["Sat","Sun"].includes(weekday);
      const safe = !weekend && current >= start && current <= end;
      return {
        label: weekend ? "Weekend" : safe ? "Safe to call" : current < start ? "Too early" : "Too late",
        cls: safe ? "green" : weekend ? "purple" : "red",
        time: safeIntl(zone, { hour:"numeric", minute:"2-digit", second:"2-digit" }, now),
        date: safeIntl(zone, { weekday:"short", month:"short", day:"numeric" }, now),
        safe,
        zone
      };
    } catch {
      return { label:"Invalid timezone", cls:"red", time:"—", date:"—", safe:false, zone };
    }
  }

  function toast(message, ms = 2600) {
    const el = document.getElementById("toast");
    el.textContent = message;
    el.classList.add("show");
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => el.classList.remove("show"), ms);
  }

  function copyText(text, success = "Copied") {
    const value = String(text || "");
    if (!value) return toast("Nothing to copy");
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(value).then(() => toast(success)).catch(() => fallbackCopy(value, success));
    } else fallbackCopy(value, success);
  }

  function fallbackCopy(value, success) {
    const ta = document.createElement("textarea");
    ta.value = value;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast(success); } catch { toast("Copy failed"); }
    ta.remove();
  }

  function downloadFile(filename, content, type = "text/plain") {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

      layer.appendChild(piece);
    }
    setTimeout(() => layer.innerHTML = "", 1200);
  }

  function playSoundDataUrl(dataUrl, volume = 0.7) {
    try {
      const audio = new Audio(dataUrl);
      audio.volume = volume;
      audio.preload = "auto";
      audio.play().catch(() => {});
    } catch {}
  }

  function playStompSound() {
    playSoundDataUrl(STOMP_SOUND_DATA_URL, 0.72);
  }

  function playCoinSound() {
    playSoundDataUrl(COIN_SOUND_DATA_URL, 0.80);
  }

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = "";
    let quoted = false;
    const source = String(text || "").replace(/^\uFEFF/, "");
    for (let i = 0; i < source.length; i++) {
      const ch = source[i];
      if (quoted) {
        if (ch === '"') {
          if (source[i + 1] === '"') { cell += '"'; i++; }
          else quoted = false;
        } else cell += ch;
      } else {
        if (ch === '"') quoted = true;
        else if (ch === ',') { row.push(cell); cell = ""; }
        else if (ch === '\n') { row.push(cell.replace(/\r$/, "")); rows.push(row); row = []; cell = ""; }
        else cell += ch;
      }
    }
    if (cell.length || row.length) { row.push(cell.replace(/\r$/, "")); rows.push(row); }
    return rows.filter(r => r.some(v => String(v).trim() !== ""));
  }

  function rowsToObjects(rows, headerMap) {
    if (!rows.length) return [];
    const headers = rows[0].map(h => headerMap[normalizeHeader(h)] || normalizeHeader(h).replace(/[^a-z0-9]+/g, "_"));
    return rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = String(row[i] ?? "").trim());
      return obj;
    });
  }

  function merchantUidFromRaw(raw) {
    const ddmx = String(raw.ddmx_account_id || "").trim();
    const store = cleanStoreId(raw.store_id);
    const business = cleanStoreId(raw.business_id);
    if (ddmx) return `ddmx_${ddmx}`;
    if (store) return `store_${store}`;
    if (business) return `business_${business}`;
    return uid("merchant");
  }

  function normalizeMerchant(raw) {
    const uidValue = merchantUidFromRaw(raw);
    return {
      uid: uidValue,
      account_owner: raw.account_owner || "",
      ultimate_parent_id: raw.ultimate_parent_id || "",
      ultimate_parent_name: raw.ultimate_parent_name || "",
      business_id: cleanStoreId(raw.business_id),
      business_name: raw.business_name || "",
      ddmx_account_id: raw.ddmx_account_id || "",
      store_id: cleanStoreId(raw.store_id),
      store_name: raw.store_name || raw.business_name || raw.ultimate_parent_name || "Unnamed merchant",
      market_name: raw.market_name || "",
      region_name: raw.region_name || "",
      submarket_name: raw.submarket_name || "",
      timezone: raw.timezone || "",
      language: raw.language || "",
      medal_rank: raw.medal_rank || "",
      dm_name: raw.dm_name || "",
      dm_email: raw.dm_email || "",
      dm_phone: raw.dm_phone || "",
      mx_portal_link: /^https?:\/\//i.test(raw.mx_portal_link || "") ? raw.mx_portal_link : "",
      ddmx_link: /^https?:\/\//i.test(raw.ddmx_link || "") ? raw.ddmx_link : "",
      photo_coverage: percentValue(raw.photo_coverage),
      description_coverage: percentValue(raw.description_coverage),
      uptime: percentValue(raw.uptime),
      gmv: numberValue(raw.gmv),
      touchpoint_count: numberValue(raw.touchpoint_count) || 0,
      promo_opp: Number(numberValue(raw.promo_opp) || 0),
      sl_opp: Number(numberValue(raw.sl_opp) || 0),
      is_new: raw.is_new || "",
      archived: false,
      importedAt: new Date().toISOString()
    };
  }

  function merchantIssues(merchant) {
    const issues = [];
    if (!merchant.store_id) issues.push("Missing Store ID");
    if (!merchant.timezone) issues.push("Missing timezone");
    if (!splitMulti(merchant.dm_email).length && !splitMulti(merchant.dm_phone).length) issues.push("No usable contact");
    if (!merchant.store_name || merchant.store_name === "Unnamed merchant") issues.push("Missing store name");
    if (String(merchant.dm_name || "").toUpperCase().includes("DO NOT USE")) issues.push("DO NOT USE contact");
    return issues;
  }

  function snapshotForUndo() {
    return {
      merchants: structuredClone(state.merchants),
      calls: structuredClone(state.calls),
      unmatchedCalls: structuredClone(state.unmatchedCalls),
      selectedUid: state.selectedUid,
      at: new Date().toISOString()
    };
  }

  function importMerchantsText(text, filename = "Merchants CSV") {
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error("The merchant CSV does not contain data rows.");
    const rawObjects = rowsToObjects(rows, MERCHANT_HEADER_MAP);
    const incoming = rawObjects.map(normalizeMerchant);
    if (!incoming.length) throw new Error("No merchant records could be parsed.");

    state.lastImportSnapshot = snapshotForUndo();
    const existing = new Map(state.merchants.map(m => [m.uid, m]));
    const incomingIds = new Set(incoming.map(m => m.uid));
    let added = 0, updated = 0, archived = 0;

    const merged = incoming.map(m => {
      const old = existing.get(m.uid);
      if (old) { updated++; return { ...old, ...m, archived: false }; }
      added++;
      return m;
    });

    state.merchants.forEach(old => {
      if (!incomingIds.has(old.uid)) {
        merged.push({ ...old, archived: true });
        archived++;
      }
    });

    state.merchants = merged;
    if (!getMerchant(state.selectedUid) || getMerchant(state.selectedUid)?.archived) {
      state.selectedUid = state.merchants.find(m => !m.archived)?.uid || "";
    }
    const duplicates = incoming.length - new Set(incoming.map(m => m.uid)).size;
    state.importHistory.unshift({ id: uid("import"), type:"Merchants", filename, at:new Date().toISOString(), added, updated, archived, duplicates, total:incoming.length });
    state.importHistory = state.importHistory.slice(0, 20);
    scheduleSave();
    renderApp();
    toast(`${incoming.length} merchants imported · ${added} new · ${updated} updated`);
    return { total: incoming.length, added, updated, archived, duplicates };
  }

  function parseCallDate(value) {
    const raw = String(value || "").trim();
    if (!raw) return new Date().toISOString();
    let d = new Date(raw);
    if (!Number.isNaN(d.getTime())) return d.toISOString();
    const zoneOffsets = { PST:"-08:00", PDT:"-07:00", MST:"-07:00", MDT:"-06:00", CST:"-06:00", CDT:"-05:00", EST:"-05:00", EDT:"-04:00", AST:"-04:00", ADT:"-03:00", NST:"-03:30", NDT:"-02:30" };
    const m = raw.match(/^([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})\s+(\d{1,2}):(\d{2}):(\d{2})\s+(AM|PM)\s+([A-Z]{3})$/);
    if (m) {
      let hour = Number(m[4]);
      if (m[7] === "PM" && hour !== 12) hour += 12;
      if (m[7] === "AM" && hour === 12) hour = 0;
      const month = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"}[m[1]];
      const iso = `${m[3]}-${month}-${String(m[2]).padStart(2,"0")}T${String(hour).padStart(2,"0")}:${m[5]}:${m[6]}${zoneOffsets[m[8]] || "Z"}`;
      d = new Date(iso);
      if (!Number.isNaN(d.getTime())) return d.toISOString();
    }
    return new Date().toISOString();
  }

  function callPhones(raw) {
    return unique([
      raw.prospect_mobile_phone,
      raw.prospect_home_phone,
      raw.prospect_work_phone,
      raw.prospect_voip_phone,
      raw.prospect_other_phone,
      raw.to
    ].map(digits).filter(Boolean));
  }

  function normalizeCall(raw) {
    const duration = Math.max(0, Number(numberValue(raw.duration_seconds) || 0));
    const callState = String(raw.state || "").toLowerCase();
    const timestamp = parseCallDate(raw.completed_at || raw.created_at || new Date().toISOString());
    return {
      id: String(raw.id || uid("call")),
      uid: "",
      state: callState,
      createdAt: parseCallDate(raw.created_at || timestamp),
      completedAt: timestamp,
      durationSec: duration,
      creditedSec: duration + (callState === "completed" ? 60 : 0),
      direction: raw.direction || "outbound",
      from: raw.from || "",
      to: raw.to || "",
      outcome: raw.outcome || raw.disposition || callState || "Call",
      disposition: raw.disposition || raw.outcome || callState || "Call",
      purpose: raw.purpose || "",
      note: raw.note || "",
      prospectId: raw.prospect_id || "",
      prospectName: [raw.prospect_first_name, raw.prospect_last_name].filter(Boolean).join(" "),
      prospectCompany: raw.prospect_company || "",
      prospectEmail: raw.prospect_email || "",
      prospectPhones: callPhones(raw),
      userName: [raw.user_first_name, raw.user_last_name].filter(Boolean).join(" "),
      source: "CSV",
      manual: false,
      importedAt: new Date().toISOString()
    };
  }

  function similarityScore(a, b) {
    const x = normalizeText(a), y = normalizeText(b);
    if (!x || !y) return 0;
    if (x === y) return 100;
    if (x.includes(y) || y.includes(x)) return 82;
    const xs = new Set(x.split(" ").filter(t => t.length > 1));
    const ys = new Set(y.split(" ").filter(t => t.length > 1));
    let overlap = 0;
    xs.forEach(t => { if (ys.has(t)) overlap++; });
    return Math.round((overlap / Math.max(1, Math.max(xs.size, ys.size))) * 75);
  }

  function matchCallToMerchant(call) {
    const active = state.merchants.filter(m => !m.archived);
    const email = normalizeText(call.prospectEmail).replace(/\s/g, "");
    if (email) {
      const matches = active.filter(m => splitMulti(m.dm_email).some(e => normalizeText(e).replace(/\s/g, "") === email));
      if (matches.length === 1) return { uid: matches[0].uid, method:"email", confidence:100 };
      if (matches.length > 1) return { uid:"", method:"multiple email matches", confidence:0, suggestions:matches.slice(0,5).map(m=>m.uid) };
    }

    const phones = call.prospectPhones.map(digits).filter(Boolean);
    if (phones.length) {
      const matches = active.filter(m => {
        const merchantPhones = splitMulti(m.dm_phone).map(digits);
        return merchantPhones.some(mp => phones.some(cp => mp && cp && (mp === cp || mp.endsWith(cp.slice(-10)) || cp.endsWith(mp.slice(-10)))));
      });
      if (matches.length === 1) return { uid: matches[0].uid, method:"phone", confidence:98 };
      if (matches.length > 1) return { uid:"", method:"multiple phone matches", confidence:0, suggestions:matches.slice(0,5).map(m=>m.uid) };
    }

    const company = String(call.prospectCompany || "");
    const storeIdMatch = company.match(/\b(\d{5,})\b/);
    if (storeIdMatch) {
      const matches = active.filter(m => cleanStoreId(m.store_id) === storeIdMatch[1]);
      if (matches.length === 1) return { uid: matches[0].uid, method:"store id", confidence:96 };
    }

    if (company) {
      const scored = active.map(m => ({ m, score: Math.max(similarityScore(company, m.store_name), similarityScore(company, m.business_name), similarityScore(company, m.ultimate_parent_name)) }))
        .filter(x => x.score >= 45).sort((a,b) => b.score - a.score);
      if (scored[0] && (!scored[1] || scored[0].score - scored[1].score >= 12) && scored[0].score >= 68) {
        return { uid: scored[0].m.uid, method:"company", confidence:scored[0].score };
      }
      return { uid:"", method:"company review", confidence:scored[0]?.score || 0, suggestions:scored.slice(0,5).map(x=>x.m.uid) };
    }

    return { uid:"", method:"no match fields", confidence:0, suggestions:[] };
  }

  function importCallsText(text, filename = "Calls CSV") {
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error("The calls CSV does not contain data rows.");
    const rawObjects = rowsToObjects(rows, CALL_HEADER_MAP);
    const incoming = rawObjects.map(normalizeCall);
    state.lastImportSnapshot = snapshotForUndo();
    const existingIds = new Set(state.calls.map(c => String(c.id)));
    let imported = 0, duplicates = 0, unmatched = 0, matched = 0;
    let realSec = 0, creditedSec = 0;

    for (const call of incoming) {
      if (existingIds.has(String(call.id))) { duplicates++; continue; }
      const match = matchCallToMerchant(call);
      call.uid = match.uid || "";
      call.matchMethod = match.method;
      call.matchConfidence = match.confidence;
      state.calls.push(call);
      existingIds.add(String(call.id));
      imported++;
      realSec += call.durationSec;
      creditedSec += call.creditedSec;
      if (call.uid) matched++;
      else {
        unmatched++;
        state.unmatchedCalls.push({ id: uid("unmatched"), callId: call.id, suggestions: match.suggestions || [], reason: match.method, createdAt: new Date().toISOString() });
      }
    }

    state.calls.sort((a,b) => String(b.completedAt).localeCompare(String(a.completedAt)));
    state.importHistory.unshift({ id:uid("import"), type:"Calls", filename, at:new Date().toISOString(), imported, duplicates, matched, unmatched, realSec, creditedSec });
    state.importHistory = state.importHistory.slice(0,20);
    scheduleSave();
    renderApp();
    toast(`${imported} calls imported · ${matched} matched · ${unmatched} unmatched`);
    return { imported, duplicates, matched, unmatched, realSec, creditedSec };
  }

  function undoLastImport() {
    const snap = state.lastImportSnapshot;
    if (!snap) return toast("No import snapshot is available");
    state.merchants = snap.merchants || [];
    state.calls = snap.calls || [];
    state.unmatchedCalls = snap.unmatchedCalls || [];
    state.selectedUid = snap.selectedUid || state.merchants[0]?.uid || "";
    state.lastImportSnapshot = null;
    scheduleSave();
    renderApp();
    toast("Last import was undone");
  }

  function callsFor(uidValue) { return state.calls.filter(c => c.uid === uidValue); }
  function photosFor(uidValue) { return state.photos.filter(p => p.uid === uidValue); }
  function followupsFor(uidValue) { return state.followups.filter(f => f.uid === uidValue); }
  function salesFor(uidValue) { return state.sales.filter(x => x.uid === uidValue); }
  function creditsFor(uidValue) { return state.credits.filter(x => x.uid === uidValue); }
  function lastCallFor(uidValue) { return callsFor(uidValue).sort((a,b) => String(b.completedAt).localeCompare(String(a.completedAt)))[0] || null; }
  function latestPendingFollowup(uidValue) {
    return followupsFor(uidValue).filter(f => f.status !== "Completed").sort((a,b) => followupDateTime(a) - followupDateTime(b))[0] || null;
  }
  function followupDateTime(f) {
    const d = new Date(`${f.date || toISODate()}T${f.time || "09:00"}:00`);
    return Number.isNaN(d.getTime()) ? new Date(0) : d;
  }
  function dueFollowupFor(uidValue, now = new Date()) {
    const today = dateKeyInZone(now);
    return followupsFor(uidValue).filter(f => f.status !== "Completed" && String(f.date) <= today).sort((a,b) => followupDateTime(a) - followupDateTime(b))[0] || null;
  }
  function callIsRecent(call, now = new Date()) {
    if (!call?.completedAt) return false;
    const diff = daysBetween(new Date(call.completedAt), now);
    return diff >= 0 && diff < RECENT_CALL_DAYS;
  }
  function merchantCalledRecently(merchant, now = new Date()) {
    const st = merchantState(merchant.uid);
    if (st.status === "Called" && st.statusDate) {
      const diff = daysBetween(localDateFromKey(st.statusDate), now);
      if (diff >= 0 && diff < RECENT_CALL_DAYS) return true;
    }
    return callsFor(merchant.uid).some(c => callIsRecent(c, now));
  }
  function merchantCalledToday(merchant, now = new Date()) {
    const today = dateKeyInZone(now);
    const st = merchantState(merchant.uid);
    return (st.status === "Called" && st.statusDate === today) || callsFor(merchant.uid).some(c => dateKeyInZone(c.completedAt) === today);
  }

  function deriveMerchant(merchant, now = new Date()) {
    const st = merchantState(merchant.uid);
    const issues = merchantIssues(merchant);
    const due = dueFollowupFor(merchant.uid, now);
    const nextFu = latestPendingFollowup(merchant.uid);
    const calledToday = merchantCalledToday(merchant, now);
    const calledRecently = merchantCalledRecently(merchant, now);
    const local = merchantLocalStatus(merchant, now);
    const gmv = Number(merchant.gmv || 0);
    const photo = merchant.photo_coverage;
    let lane = "To Call";
    let laneClass = "blue";
    let reason = "Ready for outreach";

    if (st.status === "Blocked") { lane = "Blocked / Data Issue"; laneClass = "red"; reason = "Blocked manually"; }
    else if (st.status === "Done") { lane = "Done"; laneClass = "green"; reason = "Completed"; }
    else if (st.status === "Waiting on Merchant") { lane = "Waiting on Merchant"; laneClass = "purple"; reason = "Waiting on merchant"; }
    else if (st.status === "Needs Data Review") { lane = "Needs Data Review"; laneClass = "orange"; reason = issues.join(" · ") || "Manual data review"; }
    else if (st.status === "Relationship / Healthy") { lane = "Relationship / Healthy"; laneClass = "green"; reason = "Healthy relationship"; }
    else if (due) { lane = "Needs Follow-up"; laneClass = due.date < dateKeyInZone(now) ? "red" : "orange"; reason = `${due.date < dateKeyInZone(now) ? "Overdue" : "Due today"}: ${due.reason}`; }
    else if (st.status === "Needs Follow-up") { lane = "Needs Follow-up"; laneClass = "orange"; reason = "Manual follow-up"; }
    else if (calledToday || st.status === "Called") { lane = "Called Today"; laneClass = "green"; reason = lastCallFor(merchant.uid)?.disposition || "Called"; }
    else if (st.status === "No Answer") { lane = "Called Today"; laneClass = "orange"; reason = "No Answer"; }
    else if (st.status === "Spoke") { lane = "Called Today"; laneClass = "green"; reason = "Spoke"; }
    else if (issues.length) { lane = "Needs Data Review"; laneClass = "orange"; reason = issues.join(" · "); }
    else if (photo != null && photo < 50 && gmv >= 5000) { lane = "High GMV + Critical Coverage"; laneClass = "red"; reason = "High GMV and critical photo coverage"; }
    else if (photo != null && photo >= 80 && !merchant.promo_opp && !merchant.sl_opp) { lane = "Relationship / Healthy"; laneClass = "green"; reason = "Healthy coverage"; }

    let score = 0;
    const today = dateKeyInZone(now);
    if (due) {
      const overdueDays = Math.max(0, daysBetween(localDateFromKey(due.date), localDateFromKey(today)));
      score += due.date < today ? 10000 + overdueDays * 80 : 9000;
      score += ({Critical:500,High:300,Medium:150,Low:50}[due.priority] || 0);
    }
    if (st.status === "Needs Follow-up" && !due) score += 8200;
    if (photo != null) score += Math.max(0, 100 - photo) * 22;
    else score += 700;
    score += Math.min(2800, gmv / 3);
    if (merchant.promo_opp) score += 420;
    if (merchant.sl_opp) score += 420;
    if (issues.length) score -= 850;
    if (!local.safe) score -= 550;
    if (calledRecently && !due) score -= 5000;
    if (["Done","Blocked / Data Issue"].includes(lane)) score -= 10000;

    return { merchant, st, issues, due, nextFu, calledToday, calledRecently, local, lane, laneClass, reason, score };
  }

  function sortedPriorityMerchants(now = new Date()) {
    return state.merchants.filter(m => !m.archived).map(m => deriveMerchant(m, now)).sort((a,b) => b.score - a.score);
  }

  function dayStats(dateKey) {
    const calls = state.calls.filter(c => dateKeyInZone(c.completedAt) === dateKey);
    const photos = state.photos.filter(p => dateKeyInZone(p.timestamp) === dateKey);
    const sales = state.sales.filter(p => dateKeyInZone(p.timestamp) === dateKey);
    const credits = state.credits.filter(p => dateKeyInZone(p.timestamp) === dateKey);
    const createdFollowups = state.followups.filter(f => dateKeyInZone(f.createdAt) === dateKey);
    const completedFollowups = state.followups.filter(f => f.completedAt && dateKeyInZone(f.completedAt) === dateKey);
    const touched = unique([...calls.map(x=>x.uid), ...photos.map(x=>x.uid), ...sales.map(x=>x.uid), ...credits.map(x=>x.uid)].filter(Boolean));
    const gmvTouched = touched.reduce((sum, uidValue) => sum + Number(getMerchant(uidValue)?.gmv || 0), 0);
    return {
      dateKey,
      calls,
      photos,
      sales,
      credits,
      createdFollowups,
      completedFollowups,
      realSec: calls.reduce((s,c)=>s+Number(c.durationSec||0),0),
      creditedSec: calls.reduce((s,c)=>s+Number(c.creditedSec||0),0),
      merchantsCalled: unique(calls.map(c=>c.uid).filter(Boolean)).length,
      attempts: calls.length,
      photosAdded: photos.reduce((s,p)=>s+Number(p.photosAdded||0),0),
      touched: touched.length,
      gmvTouched
    };
  }

  function rangeStats(startDate, days) {
    const result = [];
    for (let i = 0; i < days; i++) result.push(dayStats(toISODate(addDays(startDate, i))));
    return result;
  }

  function aggregateStats(items) {
    return items.reduce((acc, d) => {
      acc.realSec += d.realSec;
      acc.creditedSec += d.creditedSec;
      acc.calls += d.attempts;
      acc.merchants += d.merchantsCalled;
      acc.photos += d.photosAdded;
      acc.touched += d.touched;
      acc.gmv += d.gmvTouched;
      acc.followups += d.createdFollowups.length;
      acc.completedFollowups += d.completedFollowups.length;
      return acc;
    }, { realSec:0, creditedSec:0, calls:0, merchants:0, photos:0, touched:0, gmv:0, followups:0, completedFollowups:0 });
  }

  function hexToRgb(hex) {
    const clean = String(hex || "").replace("#", "");
    if (!/^[0-9a-f]{6}$/i.test(clean)) return [139,92,246];
    return [parseInt(clean.slice(0,2),16), parseInt(clean.slice(2,4),16), parseInt(clean.slice(4,6),16)];
  }

  function resolvePaletteKey(key) {
    const normalized = String(key || "").trim().toLowerCase();
    if (!normalized) return "custom";
    if (normalized === "custom") return "custom";
    if (PALETTE_PRESETS[normalized]) return normalized;
    if (PALETTE_PRESET_ALIASES[normalized] && PALETTE_PRESET_ALIASES[normalized] !== "custom") return PALETTE_PRESET_ALIASES[normalized];
    return "custom";
  }

  function detectPalettePreset(profile = state.profile) {
    const keys = ["background", "surface", "card", "text", "muted", "accent", "accent2"];
    const match = Object.entries(PALETTE_PRESETS).find(([, preset]) => keys.every(key => String(profile[key] || "").toLowerCase() === String(preset[key] || "").toLowerCase()));
    if (match) return match[0];
    return resolvePaletteKey(profile.palettePreset);
  }

  function applyPalettePreset(name, options = {}) {
    const presetKey = resolvePaletteKey(name);
    const preset = PALETTE_PRESETS[presetKey];
    if (!preset) return;
    Object.assign(state.profile, {
      palettePreset: presetKey,
      background: preset.background,
      surface: preset.surface,
      card: preset.card,
      text: preset.text,
      muted: preset.muted,
      accent: preset.accent,
      accent2: preset.accent2,
      line: preset.line,
      lineStrong: preset.lineStrong
    });
    scheduleSave();
    if (options.render !== false) renderApp();
    if (!options.silent) toast(`${preset.name} palette applied`);
  }

  function createUniqueFollowupId(extraTaken = null) {
    const taken = new Set(state.followups.map(f => String(f?.id || "")).filter(Boolean));
    if (extraTaken) extraTaken.forEach(id => taken.add(String(id)));
    let candidate = "";
    do {
      candidate = globalThis.crypto?.randomUUID
        ? `followup_${globalThis.crypto.randomUUID()}`
        : uid("followup");
    } while (taken.has(candidate));
    return candidate;
  }

  function repairFollowupIds() {
    const seen = new Set();
    state.followups = state.followups.map(followup => {
      const record = followup && typeof followup === "object" ? { ...followup } : {};
      let id = String(record.id || "").trim();
      if (!id || seen.has(id)) id = createUniqueFollowupId(seen);
      seen.add(id);
      record.id = id;
      return record;
    });
    if (state.ui.selectedFollowupId && !state.followups.some(f => f.id === state.ui.selectedFollowupId)) {
      state.ui.selectedFollowupId = "";
    }
  }

  function migrateStateV4() {
    state.version = APP_VERSION;
    if (!VIEW_META[state.currentView]) state.currentView = "dashboard";
    if (!state.profile.palettePreset) {
      const oldDefault = String(state.profile.accent || "").toLowerCase() === "#8b5cf6" && String(state.profile.background || "").toLowerCase() === "#070a12";
      if (oldDefault) {
        const preset = PALETTE_PRESETS.midnight;
        Object.assign(state.profile, preset, { palettePreset:"midnight" });
      } else {
        state.profile.palettePreset = detectPalettePreset(state.profile);
      }
    }
    state.profile.line ||= PALETTE_PRESETS[state.profile.palettePreset]?.line || "rgba(166,175,189,.18)";
    state.profile.lineStrong ||= PALETTE_PRESETS[state.profile.palettePreset]?.lineStrong || "rgba(166,175,189,.30)";
    state.settings.callGoal = Math.max(1, Number(state.settings.callGoal || 70));
    state.settings.photoGoal = Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL));
    state.settings.callAttemptGoal = Math.max(1, Number(state.settings.callAttemptGoal || DEFAULT_CALL_ATTEMPT_GOAL));
    state.ui.workHubFilters = { q:"", view:"uncalled", sort:"priority", market:"all", video:"all", photo:"all", contact:"all", ...(state.ui.workHubFilters || {}) };
    state.ui.workHubPage = Math.max(1, Math.floor(Number(state.ui.workHubPage || 1)));
    state.ui.followupFilters = { merchant:"all", reason:"all", status:"open", ...(state.ui.followupFilters || {}) };
    state.ui.followupDraftDate ||= "";
    state.ui.followupDraftTime ||= "";
    repairFollowupIds();
  }

  function applyTheme() {
    const root = document.documentElement;
    const p = state.profile;
    const [ar,ag,ab] = hexToRgb(p.accent);
    const [br,bg,bb] = hexToRgb(p.accent2);
    root.style.setProperty("--bg", p.background);
    root.style.setProperty("--bg-2", p.background);
    root.style.setProperty("--surface", p.surface);
    root.style.setProperty("--surface-2", p.card);
    root.style.setProperty("--card", p.card);
    root.style.setProperty("--card-2", p.card);
    root.style.setProperty("--text", p.text);
    root.style.setProperty("--muted", p.muted);
    root.style.setProperty("--muted-2", `color-mix(in srgb, ${p.muted} 68%, transparent)`);
    root.style.setProperty("--line", p.line || "rgba(166,175,189,.18)");
    root.style.setProperty("--line-strong", p.lineStrong || "rgba(166,175,189,.30)");
    root.style.setProperty("--accent", p.accent);
    root.style.setProperty("--accent-rgb", `${ar}, ${ag}, ${ab}`);
    root.style.setProperty("--accent-2", p.accent2);
    root.style.setProperty("--accent-2-rgb", `${br}, ${bg}, ${bb}`);
    document.body.dataset.palette = p.palettePreset || "custom";
    document.body.dataset.motion = p.motion || "smooth";
    const [lr,lg,lb] = hexToRgb(p.background);
    const perceivedLightness = .2126 * lr + .7152 * lg + .0722 * lb;
    const lightUi = perceivedLightness > 165;
    document.body.classList.toggle("light-ui", lightUi);
    root.style.colorScheme = lightUi ? "light" : "dark";
    document.body.classList.toggle("sidebar-collapsed", !!state.ui.sidebarCollapsed);

  function salesforceUrl(merchant) {
    const accountId = merchant?.ddmx_account_id || merchant?.salesforce_account_id || merchant?.account_id || "";

  function merchantSearchAddress(merchant) {
    return [merchant?.store_name, merchant?.submarket_name, merchant?.market_name, merchant?.region_name].filter(Boolean).join(" ");
  }

  function inferCategory(merchant) {
    const text = normalizeText(`${merchant?.store_name || ""} ${merchant?.business_name || ""}`);
    const rules = [
      [["sushi","japanese","ramen"], "Japanese restaurants"],
      [["thai"], "Thai restaurants"],
      [["pizza","pizzeria"], "Pizza restaurants"],
      [["burger"], "Burger restaurants"],
      [["taco","mexican","burrito"], "Mexican restaurants"],
      [["indian","curry","tandoori"], "Indian restaurants"],
      [["pho","vietnam"], "Vietnamese restaurants"],
      [["bubble tea","boba","tea"], "Bubble tea shops"],
      [["vegan","vegetarian"], "Vegan restaurants"],
      [["bakery","cafe","coffee"], "Cafes and bakeries"],
      [["chicken","wings"], "Chicken restaurants"],
      [["seafood","fish"], "Seafood restaurants"]
    ];
    for (const [tokens, label] of rules) if (tokens.some(t => text.includes(t))) return label;
    return "Restaurants";
  }

  function normalizedTelNumber(value) {
    const raw = String(value || "").trim();
    const number = raw.replace(/[^0-9+]/g, "");
    if (!number) return "";
    return number.startsWith("+") ? `+${number.slice(1).replace(/\+/g, "")}` : number.replace(/\+/g, "");
  }

  function getOutreachDialerUrl() {
    const fallback = "https://sidebar.outreach.io/calls/";
    const configured = String(state.settings.outreachDialerUrl || fallback).trim();
    try {
      const parsed = new URL(configured);
      const host = parsed.hostname.toLowerCase();
      return host === "sidebar.outreach.io" || host === "web.outreach.io" ? parsed.href : fallback;
    } catch {
      return fallback;
    }
  }

  function copyToClipboardSilently(value) {
    const text = String(value || "");
    if (!text) return Promise.resolve(false);
    const fallbackCopy = () => {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      let copied = false;
      try { copied = document.execCommand("copy"); } catch { copied = false; }
      ta.remove();
      return copied;
    };
    if (navigator.clipboard?.writeText) {
      return navigator.clipboard.writeText(text).then(() => true).catch(fallbackCopy);
    }
    return Promise.resolve(fallbackCopy());
  }

  async function openOutreachDialerForNumber(value) {
    const number = normalizedTelNumber(value);
    if (!number) return toast("No valid phone number was found");

    const width = 520;
    const height = Math.min(900, Math.max(720, window.screen?.availHeight ? window.screen.availHeight - 80 : 860));
    const left = Math.max(0, Math.round((window.screenX || 0) + Math.max(0, window.outerWidth - width - 22)));
    const top = Math.max(0, Math.round((window.screenY || 0) + 38));
    const features = `popup=yes,width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`;

    let dialerWindow = null;
    try {
      dialerWindow = window.open(getOutreachDialerUrl(), "dashworkOutreachDialer", features);
      dialerWindow?.focus();
    } catch {
      dialerWindow = null;
    }

    const copied = await copyToClipboardSilently(number);
    if (!dialerWindow) {
      toast(copied
        ? `The Outreach popup was blocked. ${number} was copied; open Outreach and paste it into To.`
        : `The Outreach popup was blocked. Open Outreach and enter ${number}.`, 5200);
      return;
    }

    toast(copied
      ? `Outreach opened · ${number} copied. Paste it into the To field.`
      : `Outreach opened. Enter ${number} in the To field.`, 4800);
  }

  function contactCards(merchant) {
    const emails = splitMulti(merchant?.dm_email);
    const phones = splitMulti(merchant?.dm_phone);

    emails.forEach((email, i) => cards.push({ type:"Email", label:i === 0 ? "Primary email" : `Email ${i+1}`, value:email }));

  function renderApp(options = {}) {

    const activeValue = preserveFocus && active && "value" in active ? active.value : "";

  function statusTone(status) {
    const value = String(status || "Active").trim();
    const key = value.toLowerCase();
    if (!value || key === "active" || key === "active / auto") return "active";
    if (key === "called") return "called";
    if (key === "no answer") return "no-answer";
    if (key === "spoke") return "spoke";
    if (key === "needs follow-up") return "needs-follow-up";
    if (key === "waiting on merchant") return "waiting-on-merchant";
    if (key === "blocked") return "blocked";
    if (key === "done") return "done";
    if (key === "relationship / healthy") return "relationship-healthy";
    if (key === "needs data review") return "needs-data-review";
    return "active";

    if (value === "critical") return "priority-critical";
    if (value === "high") return "priority-high";
    if (value === "low") return "priority-low";

  function gmailComposeUrl({ to = "", subject = "", body = "" } = {}) {
    const params = new URLSearchParams();
    params.set("view", "cm");
    params.set("fs", "1");
    if (to) params.set("to", to);
    if (subject) params.set("su", subject);
    if (body) params.set("body", body);
    return `https://mail.google.com/mail/?${params.toString()}`;
  }

  function buildEmailRecapDraft(merchant) {
    const st = merchantState(merchant.uid);
    const dmName = String(merchant.dm_name || merchant.store_name || "there").trim();
    const latestCall = callsFor(merchant.uid).sort((a, b) => String(b.completedAt).localeCompare(String(a.completedAt)))[0];
    const latestFollowup = followupsFor(merchant.uid).filter(f => f.status !== "Completed").sort((a, b) => String(a.updatedAt || a.createdAt).localeCompare(String(b.updatedAt || b.createdAt))).slice(-1)[0];
    const latestTimeline = merchantTimeline(merchant.uid)[0];
    const subject = st.emailRecapSubject || `DoorDash campaign next steps - ${merchant.store_name}`;
    const body = st.emailRecapBody || [
      `Hi ${dmName},`,
      ``,
      `I wanted to follow up on ${merchant.store_name}.`,
      ``,
      `What I captured:`,
      `- ${st.note || latestTimeline?.detail || latestCall?.note || "We reviewed the next step and timing."}`,
      latestFollowup ? `- Follow-up: ${latestFollowup.reason} on ${latestFollowup.date} at ${formatTime12(latestFollowup.time || "10:00")}.` : `- Next step: Please confirm the next step whenever convenient.`,
      ``,
      `Thank you,`,
      state.profile.username || "Workspace user"
    ].join("\n");
    return {
      to: splitMulti(merchant.dm_email)[0] || "",
      subject,
      body
    };
  }

  function buildWeeklyChart(items) {
    const values = items.map(x => x.creditedSec / 60);
    const max = Math.max(10, ...values);
    const w = 620, h = 170, padX = 22, padY = 22;
    const step = (w - padX * 2) / Math.max(1, values.length - 1);
    const points = values.map((v,i) => [padX + i * step, h - padY - (v / max) * (h - padY * 2)]);
    const line = points.map(p => p.join(",")).join(" ");
    const area = `${padX},${h-padY} ${line} ${w-padX},${h-padY}`;
    return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-label="Weekly credited minutes chart">
      <defs><linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".58"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
      ${[.25,.5,.75,1].map(r => `<line class="chart-grid-line" x1="${padX}" y1="${h-padY-r*(h-padY*2)}" x2="${w-padX}" y2="${h-padY-r*(h-padY*2)}"/>`).join("")}
      <polygon class="chart-area" points="${area}"/>
      <polyline class="chart-line" points="${line}"/>
      ${points.map((p,i)=>`<circle class="chart-dot" cx="${p[0]}" cy="${p[1]}" r="4"/><text class="chart-label" x="${p[0]}" y="${h-5}" text-anchor="middle">${formatDate(localDateFromKey(items[i].dateKey),{weekday:"short",month:undefined,day:undefined,year:undefined})}</text>`).join("")}
    </svg>`;
  }

  function renderDashboard() {
    const now = new Date();
    const today = dateKeyInZone(now);
    const stats = dayStats(today);
    const goalMinutes = Math.max(1, Number(state.settings.callGoal || 70));
    const goalSec = goalMinutes * 60;
    const goalPct = clamp((stats.creditedSec / goalSec) * 100, 0, 100);
    const priority = sortedPriorityMerchants(now).filter(x => !["Done","Blocked / Data Issue"].includes(x.lane));
    const next = priority.slice(0, 8);
    const due = state.followups
      .filter(f => f.status !== "Completed" && f.date <= today)
      .sort((a,b) => followupDateTime(a) - followupDateTime(b))
      .slice(0, 5);
    const weekStart = startOfWeek(now);
    const weekItems = rangeStats(weekStart, 7);
    const weekTotal = aggregateStats(weekItems);
    const zones = CANADA_ZONES.slice(0,4);
    const remainingMinutes = Math.max(0, goalMinutes - Math.round(stats.creditedSec / 60));

    return `<div class="dashboard-flow">
      <section class="dashboard-hero surface-card">
        <div class="dashboard-hero-copy">
          <span class="dashboard-eyebrow">Daily operations</span>
          <h2>${greeting()}, ${esc(state.profile.username || "Account Manager")}</h2>
          <p>Follow-ups due today stay at the top. Merchant queues are intentionally name-only so you can scan and act without visual noise.</p>
        </div>
        <div class="dashboard-hero-actions">
          <button class="btn primary" type="button" data-nav="workhub">Open Work Hub</button>
          <button class="btn blue" type="button" data-nav="followups">Open calendar</button>
          <button class="btn ghost" type="button" data-action="closeDay">Close day</button>
        </div>
      </section>

      <section class="kpi-strip" aria-label="Daily metrics">
        ${dashboardKpi("Credited time", mmss(stats.creditedSec), `${remainingMinutes} min remaining`, goalPct, "accent")}
        ${dashboardKpi("Real talk time", mmss(stats.realSec), `${stats.attempts} call attempt${stats.attempts===1?"":"s"}`, clamp(stats.realSec/goalSec*100,0,100), "blue")}
        ${dashboardKpi("Merchants called", String(stats.merchantsCalled), `${stats.attempts} valid attempt${stats.attempts===1?"":"s"}`, clamp(stats.merchantsCalled/Math.max(1,state.merchants.filter(m=>!m.archived).length)*100,0,100), "green")}
        ${dashboardKpi("Photos added", String(stats.photosAdded), `Goal ${Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL))} per day`, clamp(stats.photosAdded/Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL))*100,0,100), "orange")}
      </section>

      <div class="dashboard-primary-grid">
        <section class="surface-card priority-surface">
          <div class="surface-heading"><div><span>Priority queue</span><h3>What to call next</h3></div><span class="quiet-chip">Names only</span></div>
          ${next.length ? `<div class="priority-name-list">${next.map(x => merchantRowHTML(x, "workhub")).join("")}</div>` : emptyWorkspace()}
        </section>

        <aside class="dashboard-side-stack">
          <section class="surface-card goal-surface">

          <div class="surface-heading"><div><span>Live clocks</span><h3>Canada time zones</h3></div><span class="quiet-chip">Auto synced</span></div>

  function dashboardKpi(label, value, note, percent, tone = "accent") {
    return `<article class="kpi-tile"><div class="kpi-top"><span>${esc(label)}</span><i class="kpi-indicator ${attr(tone)}"></i></div><strong>${esc(value)}</strong><small>${esc(note)}</small><div class="kpi-progress ${attr(tone)}"><span style="width:${clamp(percent,0,100)}%"></span></div></article>`;
  }

  function greeting() {
    const h = Number(safeIntl(state.settings.userTz,{hour:"2-digit",hour12:false})) || new Date().getHours();
    if (h < 12) return "Good morning";
    if (h < 18) return "Good afternoon";
    return "Good evening";
  }

  function startOfWeek(date) {
    const d = startOfDay(date);
    const day = d.getDay();
    const delta = day === 0 ? -6 : 1 - day;
    return addDays(d, delta);
  }

  function followupRowCompact(f) {
    const merchant = getMerchant(f.uid);
    const today = dateKeyInZone(new Date());
    const overdue = f.status !== "Completed" && f.date < today;
    return `<button class="followup-row followup-row-button ${f.status === "Completed" ? "completed" : overdue ? "overdue" : ""}" type="button" data-edit-followup="${attr(f.id)}">
      <div class="followup-row-top"><strong>${esc(merchant?.store_name || "Unassigned")}</strong><span class="pill ${f.priority === "Critical" ? "red" : f.priority === "High" ? "orange" : "blue"}">${esc(f.priority || "Medium")}</span></div>
      <span>${esc(f.reason || "Follow-up")} · ${esc(f.date)} ${esc(formatTime12(f.time || "10:00"))}</span>
    </button>`;
  }



  function optionList(values, current, allLabel = "") {
    const first = allLabel ? `<option value="all" ${current === "all" ? "selected" : ""}>${esc(allLabel)}</option>` : "";
    return first + values.map(value => `<option value="${attr(value)}" ${String(current || "") === String(value) ? "selected" : ""}>${esc(value)}</option>`).join("");
  }

  function resolvedContentStatuses(uidValue) {
    const st = merchantState(uidValue);
    const video = st.videoStatus || (st.videoInReview ? "In review" : "Not started");
    const photo = st.photoReviewStatus || st.photoStatus || (st.hasPhotos ? "Approved" : "Needs Photos");
    const statusMap = { "No Answer":"Voicemail", "Spoke":"DM reached", "Needs Follow-up":"Need follow-up" };
    const contact = st.contactStatus || statusMap[st.status] || "Not tracked";
    return { video, photo, contact };
  }

  function readWorkHubFilters() {
    return {
      q: document.getElementById("workHubSearch")?.value || "",
      view: document.getElementById("workHubView")?.value || "all",
      sort: document.getElementById("workHubSort")?.value || "priority",
      market: document.getElementById("workHubMarket")?.value || "all",
      video: document.getElementById("workHubVideoFilter")?.value || "all",
      photo: document.getElementById("workHubPhotoFilter")?.value || "all",
      contact: document.getElementById("workHubContactFilter")?.value || "all"
    };
  }

  function workHubPageTokens(currentPage, totalPages) {
    if (totalPages <= 7) return Array.from({ length: totalPages }, (_, index) => index + 1);
    const tokens = [1];
    const start = Math.max(2, currentPage - 2);
    const end = Math.min(totalPages - 1, currentPage + 2);
    if (start > 2) tokens.push("ellipsis");
    for (let page = start; page <= end; page++) tokens.push(page);
    if (end < totalPages - 1) tokens.push("ellipsis");
    tokens.push(totalPages);
    return tokens;
  }

  function renderWorkHubPagination(currentPage, totalPages, totalItems) {
    const tokens = workHubPageTokens(currentPage, totalPages);
    const disabledPrev = currentPage <= 1 ? "disabled" : "";
    const disabledNext = currentPage >= totalPages ? "disabled" : "";
    return `<footer class="queue-pagination" aria-label="Call Board pagination">
      <span class="queue-page-meta">Page ${currentPage} of ${totalPages} · ${totalItems} merchant${totalItems === 1 ? "" : "s"}</span>
      <div class="queue-page-controls">
        <button class="queue-page-btn" type="button" data-workhub-page="1" ${disabledPrev} aria-label="First page" title="First page">«</button>
        <button class="queue-page-btn" type="button" data-workhub-page="${Math.max(1, currentPage - 1)}" ${disabledPrev} aria-label="Previous page" title="Previous page">‹</button>
        ${tokens.map(token => token === "ellipsis"
          ? `<span class="queue-page-ellipsis" aria-hidden="true">…</span>`
          : `<button class="queue-page-btn ${token === currentPage ? "active" : ""}" type="button" data-workhub-page="${token}" ${token === currentPage ? 'aria-current="page"' : ""}>${token}</button>`).join("")}
        <button class="queue-page-btn" type="button" data-workhub-page="${Math.min(totalPages, currentPage + 1)}" ${disabledNext} aria-label="Next page" title="Next page">›</button>
        <button class="queue-page-btn" type="button" data-workhub-page="${totalPages}" ${disabledNext} aria-label="Last page" title="Last page">»</button>
      </div>
    </footer>`;
  }

  function renderWorkHub() {
    const activeMerchants = state.merchants.filter(m => !m.archived);
    if (!activeMerchants.length) return `<section class="panel">${emptyWorkspace()}</section>`;
    const filters = { q:"", view:"uncalled", sort:"priority", market:"all", video:"all", photo:"all", contact:"all", ...(state.ui.workHubFilters || {}) };
    let selected = selectedMerchant();
    if (!selected || selected.archived) {
      selected = activeMerchants[0];
      state.selectedUid = selected.uid;
    }
    const markets = unique(activeMerchants.map(m=>m.market_name)).sort();
    const queue = activeMerchants.map(m=>deriveMerchant(m)).filter(d => {
      const m = d.merchant;
      const st = merchantState(m.uid);
      const content = resolvedContentStatuses(m.uid);
      const q = normalizeText(filters.q);
      const hay = normalizeText([m.store_name,m.business_name,m.store_id,m.market_name,m.submarket_name,m.dm_name,m.dm_email,m.dm_phone].join(" "));
      const viewOk = filters.view === "all" || filters.view === "az" ||
        (filters.view === "uncalled" && !d.calledRecently) ||
        (filters.view === "called" && d.calledRecently) ||
        (filters.view === "due" && !!d.due) ||
        (filters.view === "photo" && (content.photo === "Approved" || !!st.hasPhotos)) ||
        (filters.view === "noanswer" && st.status === "No Answer") ||
        (filters.view === "spoke" && st.status === "Spoke");
      return (!q || hay.includes(q)) &&
        (filters.market === "all" || m.market_name === filters.market) &&
        (filters.video === "all" || content.video === filters.video) &&
        (filters.photo === "all" || content.photo === filters.photo) &&
        (filters.contact === "all" || content.contact === filters.contact) &&
        viewOk;
    })
      .sort((a, b) => {
        if (filters.view === "az" || filters.sort === "az") {
          return a.merchant.store_name.localeCompare(b.merchant.store_name, undefined, { sensitivity: "base" });
        }
        const scoreDiff = b.score - a.score;
        if (scoreDiff !== 0) return scoreDiff;
        return a.merchant.store_name.localeCompare(b.merchant.store_name, undefined, { sensitivity: "base" });
      });

    const totalPages = Math.max(1, Math.ceil(queue.length / WORK_HUB_PAGE_SIZE));
    const requestedPage = Math.max(1, Math.floor(Number(state.ui.workHubPage || 1)));
    const currentPage = clamp(requestedPage, 1, totalPages);
    state.ui.workHubPage = currentPage;
    const pageStart = (currentPage - 1) * WORK_HUB_PAGE_SIZE;
    const visibleQueue = queue.slice(pageStart, pageStart + WORK_HUB_PAGE_SIZE);
    const tab = state.ui.workHubTab || "call";

    return `<div class="hub-layout">
      <aside class="panel hub-queue">
        <div class="card-head"><div><div class="card-kicker">Call board</div><h3>${queue.length} merchants</h3></div><span class="pill blue">${esc(filters.view)}</span></div>
        <div class="form-grid" style="margin-bottom:10px">
          <div class="field c12"><label>Search</label><input id="workHubSearch" value="${attr(filters.q || "")}" placeholder="Merchant, market, contact…" /></div>
          <div class="field c6"><label>View</label><select id="workHubView"><option value="uncalled" ${filters.view==="uncalled"?"selected":""}>Uncalled recently</option><option value="called" ${filters.view==="called"?"selected":""}>Called recently</option><option value="due" ${filters.view==="due"?"selected":""}>Follow-up due</option><option value="photo" ${filters.view==="photo"?"selected":""}>Photo approved</option><option value="noanswer" ${filters.view==="noanswer"?"selected":""}>No Answer</option><option value="spoke" ${filters.view==="spoke"?"selected":""}>Spoke</option><option value="az" ${filters.view==="az"?"selected":""}>A-Z</option><option value="all" ${filters.view==="all"?"selected":""}>All merchants</option></select></div>
          <div class="field c4"><label>Sort</label><select id="workHubSort"><option value="priority" ${filters.sort==="priority"?"selected":""}>Priority</option><option value="az" ${filters.sort==="az"?"selected":""}>A-Z</option></select></div>
          <div class="field c4"><label>Market</label><select id="workHubMarket"><option value="all">All markets</option>${markets.map(x=>`<option ${filters.market===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div>
        </div>
        <div class="tracker-filter-panel">
          <div class="tracker-filter-head"><strong>Tracker filters</strong><span>Filter the queue by video, photo and contact status.</span></div>
          <div class="tracker-filter-grid">
            <div class="field"><label>Video status</label><select id="workHubVideoFilter">${optionList(VIDEO_STATUS_OPTIONS, filters.video, "All video statuses")}</select></div>
            <div class="field"><label>Photo status</label><select id="workHubPhotoFilter">${optionList(PHOTO_STATUS_OPTIONS, filters.photo, "All photo statuses")}</select></div>
            <div class="field"><label>Contact status</label><select id="workHubContactFilter">${optionList(CONTACT_STATUS_OPTIONS, filters.contact, "All contact statuses")}</select></div>
          </div>
        </div>
        <div class="queue-scroll call-board-page" style="margin-top:10px">${queue.length ? visibleQueue.map(x=>merchantRowHTML(x)).join("") : `<div class="empty-state"><strong>No matches</strong><span>Change the queue filters.</span></div>`}</div>
        ${renderWorkHubPagination(currentPage, totalPages, queue.length)}
      </aside>

      <section class="panel">
        ${renderActiveMerchantHeader(selected)}
        <div class="hub-tabs">
          <button class="hub-tab ${tab==="call"?"active":""}" type="button" data-workhub-tab="call">Call Log</button>
          <button class="hub-tab ${tab==="photo"?"active":""}" type="button" data-workhub-tab="photo">Photo Counter</button>
          <button class="hub-tab ${tab==="ads"?"active":""}" type="button" data-workhub-tab="ads">Ads & Credits</button>
        </div>
        ${tab === "photo" ? renderPhotoCounter(selected) : tab === "ads" ? renderAdsCredits(selected) : renderCallConsole(selected)}
      </section>
    </div>`;
  }
