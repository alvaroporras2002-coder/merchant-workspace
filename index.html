<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Merchant Workspace</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dd-portal-ui dd-default">
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-mark"></div>
        <div>
          <h1>Merchant Workspace</h1>
          <p>Operations dashboard</p>
        </div>
      </div>

      <button class="sidebar-toggle" id="sidebarToggle">☰</button>

      <nav class="workspace-topnav" id="workspaceTopNav"></nav>
    </aside>

    <main class="main">
      <section class="workspace-topbar">
        <div class="workspace-search">
          <input id="merchantGlobalSearch" type="search" placeholder="Search any merchant field..." />
          <div class="workspace-search-results" id="merchantGlobalSearchResults"></div>
        </div>
      </section>

      <section class="panel timezone-panel" id="timezonePanel">
        <div class="section-title">
          <h3>Timezones</h3>
          <button class="btn ghost compact-btn" id="timezoneToggleBtn">Hide</button>
        </div>
        <div class="tz-strip" id="tzStrip"></div>
      </section>

      <section class="page active" id="view-dashboard"></section>
      <section class="page" id="view-pipeline"></section>
      <section class="page" id="view-callControl"></section>
      <section class="page" id="view-followups"></section>
      <section class="page" id="view-activity"></section>
      <section class="page" id="view-logs"></section>
      <section class="page" id="view-gpts"></section>
      <section class="page" id="view-resources"></section>
      <section class="page" id="view-settings"></section>
    </main>
  </div>

  <div id="commandBackdrop" class="command-backdrop"></div>
  <div id="commandBar" class="command-bar"></div>
  <div id="toast" class="toast"></div>

  <script src="app.js" defer></script>
</body>
</html>
