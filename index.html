  function workHubPageTokens(currentPage, totalPages) {
    if (totalPages <= 7) return Array.from({ length: totalPages }, (_, index) => index + 1);
    const tokens = [1];
    const start = Math.max(2, currentPage - 2);
    const end = Math.min(totalPages - 1, currentPage + 2);
    if (start > 2) tokens.push("ellipsis");
    for (let page = start; page <= end; page++) tokens.push(page);
    if (end < totalPages - 1) tokens.push("ellipsis");
    tokens.push(totalPages);
    return tokens;
  }

  function renderWorkHubPagination(currentPage, totalPages, totalItems) {
    const tokens = workHubPageTokens(currentPage, totalPages);
    const disabledPrev = currentPage <= 1 ? "disabled" : "";
    const disabledNext = currentPage >= totalPages ? "disabled" : "";
    return `<footer class="queue-pagination" aria-label="Call Board pagination">
      <span class="queue-page-meta">Page ${currentPage} of ${totalPages} · ${totalItems} merchant${totalItems === 1 ? "" : "s"}</span>
      <div class="queue-page-controls">
        <button class="queue-page-btn" type="button" data-workhub-page="1" ${disabledPrev} aria-label="First page" title="First page">«</button>
        <button class="queue-page-btn" type="button" data-workhub-page="${Math.max(1, currentPage - 1)}" ${disabledPrev} aria-label="Previous page" title="Previous page">‹</button>
        ${tokens.map(token => token === "ellipsis"
          ? `<span class="queue-page-ellipsis" aria-hidden="true">…</span>`
          : `<button class="queue-page-btn ${token === currentPage ? "active" : ""}" type="button" data-workhub-page="${token}" ${token === currentPage ? 'aria-current="page"' : ""}>${token}</button>`).join("")}
        <button class="queue-page-btn" type="button" data-workhub-page="${Math.min(totalPages, currentPage + 1)}" ${disabledNext} aria-label="Next page" title="Next page">›</button>
        <button class="queue-page-btn" type="button" data-workhub-page="${totalPages}" ${disabledNext} aria-label="Last page" title="Last page">»</button>
      </div>
    </footer>`;
  }

  function renderWorkHub() {
    const activeMerchants = state.merchants.filter(m => !m.archived);
    if (!activeMerchants.length) return `<section class="panel">${emptyWorkspace()}</section>`;
    const filters = { q:"", view:"uncalled", market:"all", video:"all", photo:"all", contact:"all", ...(state.ui.workHubFilters || {}) };
    let selected = selectedMerchant();
    if (!selected || selected.archived) {
      selected = activeMerchants[0];
      state.selectedUid = selected.uid;
    }
    const markets = unique(activeMerchants.map(m=>m.market_name)).sort();
    const queue = activeMerchants.map(m=>deriveMerchant(m)).filter(d => {
      const m = d.merchant;
      const st = merchantState(m.uid);
      const content = resolvedContentStatuses(m.uid);
      const q = normalizeText(filters.q);
      const hay = normalizeText([m.store_name,m.business_name,m.store_id,m.market_name,m.submarket_name,m.dm_name,m.dm_email,m.dm_phone].join(" "));
      const viewOk = filters.view === "all" ||
        (filters.view === "uncalled" && !d.calledRecently) ||
        (filters.view === "called" && d.calledRecently) ||
        (filters.view === "due" && !!d.due) ||
        (filters.view === "photo" && (content.photo === "Approved" || !!st.hasPhotos)) ||
        (filters.view === "noanswer" && st.status === "No Answer") ||
        (filters.view === "spoke" && st.status === "Spoke");
      return (!q || hay.includes(q)) &&
        (filters.market === "all" || m.market_name === filters.market) &&
        (filters.video === "all" || content.video === filters.video) &&
        (filters.photo === "all" || content.photo === filters.photo) &&
        (filters.contact === "all" || content.contact === filters.contact) &&
        viewOk;
    }).sort((a,b)=>b.score-a.score);

    const totalPages = Math.max(1, Math.ceil(queue.length / WORK_HUB_PAGE_SIZE));
    const requestedPage = Math.max(1, Math.floor(Number(state.ui.workHubPage || 1)));
    const currentPage = clamp(requestedPage, 1, totalPages);
    state.ui.workHubPage = currentPage;
    const pageStart = (currentPage - 1) * WORK_HUB_PAGE_SIZE;
    const visibleQueue = queue.slice(pageStart, pageStart + WORK_HUB_PAGE_SIZE);
    const tab = state.ui.workHubTab || "call";

    return `<div class="hub-layout">
      <aside class="panel hub-queue">
        <div class="card-head"><div><div class="card-kicker">Call board</div><h3>${queue.length} merchants</h3></div><span class="pill blue">${esc(filters.view)}</span></div>
        <div class="form-grid" style="margin-bottom:10px">
          <div class="field c12"><label>Search</label><input id="workHubSearch" value="${attr(filters.q || "")}" placeholder="Merchant, market, contact…" /></div>
          <div class="field c6"><label>View</label><select id="workHubView"><option value="uncalled" ${filters.view==="uncalled"?"selected":""}>Uncalled recently</option><option value="called" ${filters.view==="called"?"selected":""}>Called recently</option><option value="due" ${filters.view==="due"?"selected":""}>Follow-up due</option><option value="photo" ${filters.view==="photo"?"selected":""}>Photo approved</option><option value="noanswer" ${filters.view==="noanswer"?"selected":""}>No Answer</option><option value="spoke" ${filters.view==="spoke"?"selected":""}>Spoke</option><option value="all" ${filters.view==="all"?"selected":""}>All merchants</option></select></div>
          <div class="field c6"><label>Market</label><select id="workHubMarket"><option value="all">All markets</option>${markets.map(x=>`<option ${filters.market===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div>
        </div>
        <div class="tracker-filter-panel">
          <div class="tracker-filter-head"><strong>Tracker filters</strong><span>Filter the queue by video, photo and contact status.</span></div>
          <div class="tracker-filter-grid">
            <div class="field"><label>Video status</label><select id="workHubVideoFilter">${optionList(VIDEO_STATUS_OPTIONS, filters.video, "All video statuses")}</select></div>
            <div class="field"><label>Photo status</label><select id="workHubPhotoFilter">${optionList(PHOTO_STATUS_OPTIONS, filters.photo, "All photo statuses")}</select></div>
            <div class="field"><label>Contact status</label><select id="workHubContactFilter">${optionList(CONTACT_STATUS_OPTIONS, filters.contact, "All contact statuses")}</select></div>
          </div>
        </div>
        <div class="queue-scroll call-board-page" style="margin-top:10px">${queue.length ? visibleQueue.map(x=>merchantRowHTML(x)).join("") : `<div class="empty-state"><strong>No matches</strong><span>Change the queue filters.</span></div>`}</div>
        ${renderWorkHubPagination(currentPage, totalPages, queue.length)}
      </aside>

      <section class="panel">
        ${renderActiveMerchantHeader(selected)}
        <div class="hub-tabs">
          <button class="hub-tab ${tab==="call"?"active":""}" type="button" data-workhub-tab="call">Call Log</button>
          <button class="hub-tab ${tab==="photo"?"active":""}" type="button" data-workhub-tab="photo">Photo Counter</button>
          <button class="hub-tab ${tab==="ads"?"active":""}" type="button" data-workhub-tab="ads">Ads & Credits</button>
        </div>
        ${tab === "photo" ? renderPhotoCounter(selected) : tab === "ads" ? renderAdsCredits(selected) : renderCallConsole(selected)}
      </section>
    </div>`;
  }

  function renderCallConsole(merchant) {
    const st = merchantState(merchant.uid);

    const calls = callsFor(merchant.uid).sort((a,b)=>String(b.completedAt).localeCompare(String(a.completedAt)));
    const currentStatus = st.status || "Active";
    const statusToneClass = `status-tone-${statusTone(currentStatus)}`;
    const draft = buildEmailRecapDraft(merchant);
    return `<div class="card-head"><div><div class="card-kicker">Call console</div><h3>Status, notes and manual calls</h3></div><div class="card-hint">Use Active / Auto to remove a manual status and return the merchant to automatic routing.</div></div>

            <option value="No Answer" ${currentStatus === "No Answer" ? "selected" : ""}>No Answer</option>
            <option value="Spoke" ${currentStatus === "Spoke" ? "selected" : ""}>Spoke</option>

  function cad(value) {
    return new Intl.NumberFormat("en-CA", { style:"currency", currency:"CAD", minimumFractionDigits:2, maximumFractionDigits:2 }).format(Number(value || 0));
  }

  function adSpendValues(weeklyBudget, costPerOrder) {
    const weekly = Math.max(0, Number(weeklyBudget || 0));
    const cpo = Math.max(.01, Number(costPerOrder || 0));
    const daily = weekly / 7;
    const cap = daily * 2;
    const monthly = daily * 30.4;
    return { weekly, cpo, daily, cap, monthly, dailyOrders: Math.max(0, Math.round(daily / cpo)), capOrders: Math.max(0, Math.round(cap / cpo)) };
  }

  function renderAdSpendCalculator(st) {
    const weekly = Number(st.adWeeklyBudget || 70);
    const cpo = Number(st.adCostPerOrder || 5);
    const calc = adSpendValues(weekly, cpo);
    return `<section class="ad-calculator" id="adSpendCalculator">
      <div class="ad-calculator-head"><div><strong>Daily Average Spend Calculator</strong><span>Sponsored Listings budget support. Weekly budget ÷ 7 creates the daily average; monthly spend uses daily average × 30.4.</span></div><a class="btn small ghost" href="https://saulchavez-dd171997.github.io/DoorDash-Tools/daily-spend/" target="_blank" rel="noopener noreferrer">Open original tool</a></div>
      <div class="ad-calc-inputs">
        <div class="field"><label>Weekly budget</label><input id="adWeeklyBudget" type="number" min="0" step="1" value="${attr(weekly)}" /><input class="ad-range" id="adWeeklyBudgetRange" type="range" min="0" max="5000" step="5" value="${attr(weekly)}" /></div>
        <div class="field"><label>Bidding / cost per order</label><input id="adCostPerOrder" type="number" min="0.01" step="0.25" value="${attr(cpo)}" /><input class="ad-range" id="adCostPerOrderRange" type="range" min="0.25" max="100" step="0.25" value="${attr(cpo)}" /></div>
      </div>
      <div class="ad-calc-results">
        <div class="ad-calc-result"><span>Daily spend</span><strong id="adDailySpend">${cad(calc.daily)}</strong></div>
        <div class="ad-calc-result"><span>2× daily cap</span><strong id="adDailyCap">${cad(calc.cap)}</strong></div>
        <div class="ad-calc-result"><span>Monthly spend</span><strong id="adMonthlySpend">${cad(calc.monthly)}</strong></div>
      </div>
      <div class="ad-calc-note" id="adCalculatorNote">At ${cad(calc.cpo)} per order, about <strong>${calc.dailyOrders}</strong> ad orders can reach the daily spend and about <strong>${calc.capOrders}</strong> can reach the 2× cap. Monthly spend is calculated from the daily average, never from the cap.</div>
      <div class="button-row" style="margin-top:11px"><button class="btn blue" type="button" data-action="copyAdCalculator">Copy results</button><button class="btn ghost" type="button" data-action="resetAdCalculator">Reset</button></div>

  }

  function updateAdCalculator(sourceId = "", persist = false) {
    const weeklyInput = document.getElementById("adWeeklyBudget");
    const weeklyRange = document.getElementById("adWeeklyBudgetRange");
    const cpoInput = document.getElementById("adCostPerOrder");
    const cpoRange = document.getElementById("adCostPerOrderRange");
    if (!weeklyInput || !cpoInput) return;
    if (sourceId === "adWeeklyBudgetRange") weeklyInput.value = weeklyRange.value;
    if (sourceId === "adWeeklyBudget") weeklyRange.value = weeklyInput.value;
    if (sourceId === "adCostPerOrderRange") cpoInput.value = cpoRange.value;
    if (sourceId === "adCostPerOrder") cpoRange.value = cpoInput.value;
    const calc = adSpendValues(weeklyInput.value, cpoInput.value);
    document.getElementById("adDailySpend").textContent = cad(calc.daily);
    document.getElementById("adDailyCap").textContent = cad(calc.cap);
    document.getElementById("adMonthlySpend").textContent = cad(calc.monthly);
    document.getElementById("adCalculatorNote").innerHTML = `At ${cad(calc.cpo)} per order, about <strong>${calc.dailyOrders}</strong> ad orders can reach the daily spend and about <strong>${calc.capOrders}</strong> can reach the 2× cap. Monthly spend is calculated from the daily average, never from the cap.`;
    if (persist) {
      const merchant = selectedMerchant();
      if (merchant) setMerchantState(merchant.uid, { adWeeklyBudget:calc.weekly, adCostPerOrder:calc.cpo });
    }
  }

        </div>
        <div class="button-row" style="margin-top:11px"><button class="btn primary" type="button" data-action="saveMerchantEdits">Save changes</button><button class="btn ghost" type="button" data-action="resetMerchantLocalState">Reset local status</button></div>
        <div class="divider"></div>
        <div class="card-head"><div><div class="card-kicker">Timeline</div><h3>Calls, photos, follow-ups, sales and credits</h3></div><span class="pill">${timeline.length}</span></div>
        <div class="timeline">${timeline.length ? timeline.map(t=>`<div class="timeline-item"><div class="timeline-icon">${t.icon}</div><div><strong>${esc(t.title)}</strong><span>${esc(t.detail)} · ${formatDateTime(t.timestamp)}</span></div></div>`).join("") : `<div class="empty-state"><strong>No timeline activity</strong><span>Imported calls and Work Hub actions will appear here.</span></div>`}</div>
      </section>
    </div>`;
  }

  function kvCard(label, value) {
    return `<div class="kv-card"><span>${esc(label)}</span><strong>${esc(value == null || value === "" ? "—" : value)}</strong></div>`;
  }

  function coverageCard(label, value) {
    const n = value == null ? 0 : Number(value);
    const cls = value == null ? "" : n >= 80 ? "green" : n >= 50 ? "orange" : "red";
    return `<div class="coverage-card"><strong>${pct(value)}</strong><span>${esc(label)}</span><div class="progress ${cls}"><span style="width:${clamp(n,0,100)}%"></span></div></div>`;
  }

  function merchantTimeline(uidValue) {
    return [
      ...callsFor(uidValue).map(x=>({icon:"☎",title:x.disposition||x.state,detail:`Real ${mmss(x.durationSec)} · Credited ${mmss(x.creditedSec)}${x.note?` · ${x.note}`:""}`,timestamp:x.completedAt})),
      ...photosFor(uidValue).map(x=>({icon:"▧",title:`${x.photosAdded} photos added`,detail:`${x.status} · Coverage ${pct(x.coverageAfter)}${x.note?` · ${x.note}`:""}`,timestamp:x.timestamp})),
      ...followupsFor(uidValue).map(x=>({icon:"◫",title:`Follow-up ${x.status}`,detail:`${x.reason} · ${x.date} ${x.time||""}`,timestamp:x.updatedAt||x.createdAt})),
      ...salesFor(uidValue).map(x=>({icon:"◎",title:`Sales: ${x.type}`,detail:`${x.status} · ${x.campaign||"No campaign"}`,timestamp:x.timestamp})),
      ...creditsFor(uidValue).map(x=>({icon:"$",title:`Credit ${money2(x.amount)}`,detail:`${x.type} · ${x.status}`,timestamp:x.timestamp}))
    ].sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));
  }

  function renderFollowups() {
    const view = state.ui.followupView || "month";
    const anchor = new Date(state.ui.followupAnchor || new Date());
    const selectedId = state.ui.selectedFollowupId || "";
    const selected = state.followups.find(f=>f.id===selectedId) || null;
    const filter = state.ui.followupFilters || { merchant:"all", reason:"all", status:"open" };
    const merchants = state.merchants.filter(m=>!m.archived).sort((a,b)=>a.store_name.localeCompare(b.store_name));
    const filtered = state.followups.filter(f =>
      (filter.merchant === "all" || f.uid === filter.merchant) &&
      (filter.reason === "all" || f.reason === filter.reason) &&
      (filter.status === "all" || (filter.status === "open" ? f.status !== "Completed" : f.status === "Completed"))
    );

    return `<section class="panel">
      <div class="card-head"><div><div class="card-kicker">Follow-up calendar</div><h2>${formatFollowupRange(anchor,view)}</h2></div><div class="button-row"><button class="btn ghost" type="button" data-followup-nav="prev">Previous</button><button class="btn blue" type="button" data-followup-nav="today">Focus today</button><button class="btn ghost" type="button" data-followup-nav="next">Next</button><button class="btn primary" type="button" data-action="newFollowup">New follow-up</button></div></div>
      <div class="calendar-toolbar">
        <div class="segmented">${["day","week","month"].map(v=>`<button class="${view===v?"active":""}" type="button" data-followup-view="${v}">${v[0].toUpperCase()+v.slice(1)}</button>`).join("")}</div>
        <div class="form-grid" style="flex:1;max-width:780px">
          <div class="field c4"><label>Merchant</label><select id="followupFilterMerchant"><option value="all">All merchants</option>${merchants.map(m=>`<option value="${attr(m.uid)}" ${filter.merchant===m.uid?"selected":""}>${esc(m.store_name)}</option>`).join("")}</select></div>
          <div class="field c4"><label>Type</label><select id="followupFilterReason"><option value="all">All types</option>${FOLLOWUP_REASONS.map(r=>`<option ${filter.reason===r?"selected":""}>${esc(r)}</option>`).join("")}</select></div>
          <div class="field c4"><label>Status</label><select id="followupFilterStatus"><option value="open" ${filter.status==="open"?"selected":""}>Open</option><option value="Completed" ${filter.status==="Completed"?"selected":""}>Completed</option><option value="all" ${filter.status==="all"?"selected":""}>All</option></select></div>
        </div>
      </div>
    </section>
    <div class="calendar-shell">
      <section class="panel calendar-scroll">${renderFollowupCalendar(anchor,view,filtered)}</section>
      <aside class="panel">${renderFollowupEditor(selected,anchor)}</aside>
    </div>`;
  }

  function formatFollowupRange(anchor, view) {
    if (view === "day") return formatDate(anchor,{weekday:"long"});
    if (view === "week") {
      const start = startOfWeek(anchor), end = addDays(start,4);
      return `${formatDate(start,{month:"short",day:"numeric",year:undefined})} – ${formatDate(end,{month:"short",day:"numeric",year:"numeric"})}`;
    }
    return new Intl.DateTimeFormat("en-US",{month:"long",year:"numeric"}).format(anchor);
  }

  function renderFollowupCalendar(anchor, view, items) {
    if (view === "day") return renderFollowupDay(anchor,items);
    if (view === "week") return renderFollowupWeek(anchor,items);
    return renderFollowupMonth(anchor,items);
  }

  function formatTime12(value) {
    const [hoursRaw, minutesRaw] = String(value || "10:00").split(":").map(Number);
    const hours = Number.isFinite(hoursRaw) ? hoursRaw : 10;
    const minutes = Number.isFinite(minutesRaw) ? minutesRaw : 0;
    const suffix = hours >= 12 ? "PM" : "AM";
    const display = hours % 12 || 12;
    return `${display}:${String(minutes).padStart(2,"0")} ${suffix}`;
  }

  function renderFollowupDay(anchor, items) {
    const key = toISODate(anchor);
    const dayItems = items.filter(f=>f.date===key).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
    const hours = Array.from({length:15},(_,index)=>index+7);
    const scheduled = new Set();
    const rows = hours.map(hour => {
      const hourItems = dayItems.filter(f => Number(String(f.time || "10:00").split(":")[0]) === hour);
      hourItems.forEach(f=>scheduled.add(f.id));
      const hourValue = `${String(hour).padStart(2,"0")}:00`;
      return `<div class="agenda-hour-row">
        <div class="agenda-hour-label">${formatTime12(hourValue)}</div>
        <div class="agenda-hour-slot" data-drop-date="${key}" data-drop-time="${hourValue}">
          <button class="agenda-add-button" type="button" title="Create follow-up at ${formatTime12(hourValue)}" data-new-followup-date="${key}" data-new-followup-time="${hourValue}">+</button>
          <div class="agenda-slot-events">${hourItems.length ? hourItems.map(renderFollowupAgendaEvent).join("") : `<span class="agenda-empty">No follow-ups this hour.</span>`}</div>
        </div>
      </div>`;
    }).join("");
    const other = dayItems.filter(f=>!scheduled.has(f.id));
    return `<div class="card-head"><div><div class="card-kicker">Selected day</div><h3>${formatDate(anchor,{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</h3></div><button class="btn small primary" type="button" data-new-followup-date="${key}" data-new-followup-time="10:00">Add follow-up</button></div>
      <div class="day-agenda">${rows}${other.length?`<div class="agenda-hour-row"><div class="agenda-hour-label">Other</div><div class="agenda-hour-slot"><div class="agenda-slot-events">${other.map(renderFollowupAgendaEvent).join("")}</div></div></div>`:""}</div>`;
  }

  function renderFollowupAgendaEvent(f) {
    const merchant = getMerchant(f.uid);
    const overdue = f.status !== "Completed" && f.date < dateKeyInZone(new Date());
    return `<div class="agenda-event ${priorityTone(f.priority)} ${f.status==="Completed"?"completed":overdue?"overdue":""}" draggable="true" data-followup-drag="${attr(f.id)}" data-edit-followup="${attr(f.id)}" tabindex="0" role="button">
      <span><strong>${esc(merchant?.store_name || "Unassigned")}</strong><span>${esc(formatTime12(f.time||"10:00"))} · ${esc(f.reason||"Follow-up")}${f.notes?` · ${esc(f.notes)}`:""}</span></span>
      <span class="pill ${f.status==="Completed"?"green":overdue?"red":"blue"}">${esc(f.status||"Pending")}</span>
    </div>`;
  }

  function renderFollowupWeek(anchor, items) {
    const start = startOfWeek(anchor);
    return `<div class="calendar-grid">${["Mon","Tue","Wed","Thu","Fri"].map(x=>`<div class="calendar-day-name">${x}</div>`).join("")}${WORK_DAYS.map((_,i)=>{
      const date = addDays(start,i), key=toISODate(date);
      const dayItems = items.filter(f=>f.date===key).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
      return `<div class="calendar-cell ${key===dateKeyInZone(new Date())?"today":""}" data-drop-date="${key}">
        <div class="calendar-cell-head"><strong>${date.getDate()}</strong><button class="btn small square ghost" type="button" data-new-followup-date="${key}">+</button></div>
        ${dayItems.map(renderFollowupChip).join("") || `<span class="metric-sub">No follow-ups</span>`}
      </div>`;
    }).join("")}</div>`;
  }

  function renderFollowupMonth(anchor, items) {
    const first = new Date(anchor.getFullYear(),anchor.getMonth(),1,12);
    const last = new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);
    let start = new Date(first);
    while (start.getDay() !== 1) start = addDays(start,-1);
    let end = new Date(last);
    while (end.getDay() !== 5) end = addDays(end,1);
    const dates = [];
    for (let d = new Date(start); d <= end; d = addDays(d,1)) if (WORK_DAYS.includes(d.getDay())) dates.push(new Date(d));
    return `<div class="calendar-grid">${["Mon","Tue","Wed","Thu","Fri"].map(x=>`<div class="calendar-day-name">${x}</div>`).join("")}${dates.map(date=>{
      const key = toISODate(date);
      const dayItems = items.filter(f=>f.date===key).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
      const other = date.getMonth()!==anchor.getMonth();
      return `<div class="calendar-cell ${other?"other":""} ${key===dateKeyInZone(new Date())?"today":""}" data-drop-date="${key}">
        <div class="calendar-cell-head"><strong>${date.getDate()}</strong><button class="btn small square ghost" type="button" data-new-followup-date="${key}">+</button></div>
        ${dayItems.slice(0,4).map(renderFollowupChip).join("")}${dayItems.length>4?`<span class="pill">+${dayItems.length-4} more</span>`:""}
      </div>`;
    }).join("")}</div>`;
  }

  function renderFollowupChip(f) {
    const merchant = getMerchant(f.uid);
    const overdue = f.status !== "Completed" && f.date < dateKeyInZone(new Date());
    return `<div class="followup-chip ${priorityTone(f.priority)} ${f.status==="Completed"?"completed":overdue?"overdue":""}" draggable="true" data-followup-drag="${attr(f.id)}" data-edit-followup="${attr(f.id)}">
      <strong>${esc(merchant?.store_name || "Unassigned")}</strong><span>${esc(f.time||"")} · ${esc(f.reason||"Follow-up")}</span>
    </div>`;
  }

  function renderFollowupListRow(f) {
    const merchant = getMerchant(f.uid);
    const overdue = f.status !== "Completed" && f.date < dateKeyInZone(new Date());
    return `<div class="followup-row ${priorityTone(f.priority)} ${f.status==="Completed"?"completed":overdue?"overdue":""}" draggable="true" data-followup-drag="${attr(f.id)}" data-edit-followup="${attr(f.id)}">
      <div class="followup-row-top"><strong>${esc(merchant?.store_name || "Unassigned")}</strong><span class="pill followup-priority-badge ${priorityTone(f.priority)}">${esc(f.priority || "Medium")}</span></div>
      <span>${esc(f.reason||"Follow-up")} · ${esc(f.date)} ${esc(formatTime12(f.time||"10:00"))} · ${esc(f.status||"Pending")}</span>
      ${f.notes?`<span>${esc(f.notes)}</span>`:""}
      <div class="button-row"><button class="btn small ghost" type="button" data-edit-followup="${attr(f.id)}">Edit</button>${f.status!=="Completed"?`<button class="btn small green" type="button" data-complete-followup="${attr(f.id)}">Complete</button>`:""}<button class="btn small red" type="button" data-delete-followup="${attr(f.id)}">Delete</button></div>
    </div>`;
  }

  function renderFollowupEditor(followup, anchor) {
    const merchant = selectedMerchant();
    const draft = followup || {
      id:"",
      uid:merchant?.uid||"",
      date:state.ui.followupDraftDate || toISODate(anchor),
      time:state.ui.followupDraftTime || "10:00",

    };

      <div class="followup-editor-summary">
        <div class="followup-summary-card"><span>Date</span><strong>${esc(dateDisplay)}</strong></div>
        <div class="followup-summary-card"><span>Time</span><strong>${esc(formatTime12(draft.time||"10:00"))}</strong></div>
      </div>
      <div class="followup-merchant-banner"><span>Merchant</span><strong>${esc(selectedMerchantName)}</strong></div>
      <input id="followupId" type="hidden" value="${attr(draft.id)}" />
      <div class="form-grid">
        <div class="field c12"><label>Merchant</label><select id="followupMerchant">${merchants.map(m=>`<option value="${attr(m.uid)}" ${m.uid===draft.uid?"selected":""}>${esc(m.store_name)}</option>`).join("")}</select></div>
        <div class="field c6"><label>Date</label><input id="followupDate" type="date" value="${attr(draft.date)}" /></div>
        <div class="field c6"><label>Time</label><input id="followupTime" type="time" value="${attr(draft.time||"10:00")}" /></div>
        <div class="field c6"><label>Reason</label><select id="followupReason">${FOLLOWUP_REASONS.map(r=>`<option ${r===draft.reason?"selected":""}>${esc(r)}</option>`).join("")}</select></div>
        <div class="field c6"><label>Priority</label><select id="followupPriority">${["Low","Medium","High","Critical"].map(x=>`<option ${x===draft.priority?"selected":""}>${x}</option>`).join("")}</select></div>
        <div class="field c12"><label>Status</label><select id="followupStatus"><option ${draft.status==="Pending"?"selected":""}>Pending</option><option ${draft.status==="Completed"?"selected":""}>Completed</option><option ${draft.status==="Overdue"?"selected":""}>Overdue</option></select></div>
        <div class="field c12"><label>Notes</label><textarea id="followupNotes" placeholder="What needs to happen?">${esc(draft.notes||"")}</textarea></div>
      </div>
      <div class="button-row" style="margin-top:11px"><button class="btn primary" type="button" data-action="saveFollowup">${followup?"Save changes":"Create follow-up"}</button>${followup&&followup.status!=="Completed"?`<button class="btn green" type="button" data-complete-followup="${attr(followup.id)}">Complete</button>`:""}${followup?`<button class="btn red" type="button" data-delete-followup="${attr(followup.id)}">Delete</button>`:""}<button class="btn ghost" type="button" data-action="clearFollowupEditor">← Back</button></div>
      <div class="divider"></div>
      <div class="tracker-summary"><strong>Browser notifications</strong><span>${state.settings.notificationsEnabled?"Enabled while DASHWORK is open.":"Enable them from Settings to receive reminders while the page is open."}</span></div>`;
  }

  function renderActivity() {
    const anchor = new Date(state.ui.activityAnchor || new Date());
    const selectedKey = state.ui.selectedActivityDate || dateKeyInZone(new Date());
    const selectedDate = localDateFromKey(selectedKey);
    const day = dayStats(selectedKey);
    const week = rangeStats(startOfWeek(selectedDate),7);
    const weekAgg = aggregateStats(week);
    const monthStart = new Date(anchor.getFullYear(),anchor.getMonth(),1,12);
    const monthEnd = new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);
    const monthItems = [];
    for (let d = new Date(monthStart); d <= monthEnd; d = addDays(d,1)) monthItems.push(dayStats(toISODate(d)));
    const monthAgg = aggregateStats(monthItems);
    const minuteGoal = Math.max(1, Number(state.settings.callGoal || 70));
    const photoGoal = Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL));
    const callAttemptGoal = Math.max(1, Number(state.settings.callAttemptGoal || DEFAULT_CALL_ATTEMPT_GOAL));

    return `<section class="panel">
      <div class="card-head"><div><div class="card-kicker">Activity calendar</div><h2>${new Intl.DateTimeFormat("en-US",{month:"long",year:"numeric"}).format(anchor)}</h2></div><div class="button-row"><button class="btn ghost" type="button" data-activity-nav="prev">Previous</button><button class="btn blue" type="button" data-activity-nav="today">Focus today</button><button class="btn ghost" type="button" data-activity-nav="next">Next</button><button class="btn purple" type="button" data-action="downloadMonthlyActivity">Download month CSV</button></div></div>
      <div class="activity-goal-legend" aria-label="Daily activity goals">
        <span class="activity-goal-item"><i class="activity-goal-dot minutes"></i><span><strong>Call minutes</strong><small>${minuteGoal} credited minutes per day</small></span></span>
        <span class="activity-goal-item"><i class="activity-goal-dot photos"></i><span><strong>Photo goal</strong><small>${photoGoal} photos per day</small></span></span>
        <span class="activity-goal-item"><i class="activity-goal-dot calls"></i><span><strong>Call goal</strong><small>${callAttemptGoal} attempts per day</small></span></span>
      </div>
      <div class="calendar-scroll">${renderActivityCalendar(anchor,selectedKey)}</div>
    </section>
    <div class="bento-grid">
      <section class="bento-card span-6">
        <div class="card-head"><div><div class="card-kicker">Selected day</div><h3>${formatDate(selectedDate,{weekday:"long"})}</h3></div><div class="button-row"><button class="btn small blue" type="button" data-action="downloadDayTxt">TXT</button><button class="btn small purple" type="button" data-action="downloadDayCsv">CSV</button></div></div>
        <div class="bento-grid">
          ${miniMetric("Credited",mmss(day.creditedSec),"span-3")}${miniMetric("Real",mmss(day.realSec),"span-3")}${miniMetric("Calls",day.attempts,"span-3")}${miniMetric("Photos",day.photosAdded,"span-3")}
          ${miniMetric("Stores touched",day.touched,"span-4")}${miniMetric("Follow-ups created",day.createdFollowups.length,"span-4")}${miniMetric("GMV touched",money(day.gmvTouched),"span-4")}
        </div>
        <div class="divider"></div>
        <div class="timeline">${activityTimelineForDate(selectedKey).length ? activityTimelineForDate(selectedKey).map(t=>`<div class="timeline-item"><div class="timeline-icon">${t.icon}</div><div><strong>${esc(t.title)}</strong><span>${esc(t.detail)}</span></div></div>`).join("") : `<div class="empty-state"><strong>No activity</strong><span>No calls, photos, sales, credits or follow-ups were recorded for this day.</span></div>`}</div>
      </section>
      <section class="bento-card span-6">
        <div class="card-head"><div><div class="card-kicker">Weekly report</div><h3>${formatDate(startOfWeek(selectedDate),{month:"short",day:"numeric",year:undefined})} – ${formatDate(addDays(startOfWeek(selectedDate),6),{month:"short",day:"numeric",year:"numeric"})}</h3></div><button class="btn small green" type="button" data-action="downloadWeekCsv">Download CSV</button></div>
        <div class="bento-grid">${miniMetric("Credited",minutesLabel(weekAgg.creditedSec),"span-4")}${miniMetric("Attempts",weekAgg.calls,"span-4")}${miniMetric("Photos",weekAgg.photos,"span-4")}${miniMetric("Follow-ups",weekAgg.followups,"span-4")}${miniMetric("Completed",weekAgg.completedFollowups,"span-4")}${miniMetric("GMV touched",money(weekAgg.gmv),"span-4")}</div>
        <div class="divider"></div>
        <div class="table-wrap" style="max-height:300px"><table><thead><tr><th>Date</th><th>Credited</th><th>Real</th><th>Calls</th><th>Photos</th><th>Stores</th></tr></thead><tbody>${week.map(x=>`<tr><td>${esc(x.dateKey)}</td><td>${mmss(x.creditedSec)}</td><td>${mmss(x.realSec)}</td><td>${x.attempts}</td><td>${x.photosAdded}</td><td>${x.touched}</td></tr>`).join("")}</tbody></table></div>
      </section>
      <section class="bento-card span-12">
        <div class="card-head"><div><div class="card-kicker">Monthly ledger</div><h3>${monthItems.length} calendar days · ${WORK_DAYS.length} workdays per week</h3></div><span class="pill purple">${minutesLabel(monthAgg.creditedSec)} credited</span></div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Credited</th><th>Real</th><th>Calls</th><th>Photos</th><th>Stores</th><th>Follow-ups</th><th>GMV touched</th></tr></thead><tbody>${monthItems.map(x=>`<tr><td>${x.dateKey}</td><td>${mmss(x.creditedSec)}</td><td>${mmss(x.realSec)}</td><td>${x.attempts}</td><td>${x.photosAdded}</td><td>${x.touched}</td><td>${x.createdFollowups.length}</td><td>${money(x.gmvTouched)}</td></tr>`).join("")}</tbody></table></div>
      </section>
    </div>`;
  }

  function miniMetric(label,value,span="span-3") {
    return `<div class="bento-card ${span}" style="padding:12px"><div class="card-kicker">${esc(label)}</div><div class="metric-value" style="font-size:21px">${esc(value)}</div></div>`;
  }

  function renderActivityCalendar(anchor,selectedKey) {
    const first = new Date(anchor.getFullYear(),anchor.getMonth(),1,12);
    const last = new Date(anchor.getFullYear(),anchor.getMonth()+1,0,12);
    let start = new Date(first); while (start.getDay()!==1) start=addDays(start,-1);
    let end = new Date(last); while (end.getDay()!==5) end=addDays(end,1);
    const dates=[]; for(let d=new Date(start);d<=end;d=addDays(d,1)) if(WORK_DAYS.includes(d.getDay())) dates.push(new Date(d));
    const minuteGoal = Math.max(1, Number(state.settings.callGoal || 70));
    const photoGoal = Math.max(1, Number(state.settings.photoGoal || DEFAULT_PHOTO_GOAL));
    const callAttemptGoal = Math.max(1, Number(state.settings.callAttemptGoal || DEFAULT_CALL_ATTEMPT_GOAL));
    return `<div class="activity-calendar">${["Mon","Tue","Wed","Thu","Fri"].map(x=>`<div class="calendar-day-name">${x}</div>`).join("")}${dates.map(date=>{
      const key=toISODate(date), s=dayStats(key), other=date.getMonth()!==anchor.getMonth();
      const callMinutes = Math.round(s.creditedSec / 60);
      const minutePct = clamp(callMinutes / minuteGoal * 100, 0, 100);
      const photoPct = clamp(s.photosAdded / photoGoal * 100, 0, 100);
      const callPct = clamp(s.attempts / callAttemptGoal * 100, 0, 100);
      return `<button class="activity-cell ${key===selectedKey?"selected":""}" style="opacity:${other ? .45 : 1}" type="button" data-activity-date="${key}" title="${callMinutes}/${minuteGoal} call minutes · ${s.photosAdded}/${photoGoal} photos · ${s.attempts}/${callAttemptGoal} calls"><strong>${date.getDate()}</strong><div class="activity-bars"><div class="tiny-bar minutes" aria-label="Call minutes"><span style="width:${minutePct}%"></span></div><div class="tiny-bar photos" aria-label="Photo goal"><span style="width:${photoPct}%"></span></div><div class="tiny-bar calls" aria-label="Call goal"><span style="width:${callPct}%"></span></div></div><small>${callMinutes} min · ${s.photosAdded} photos · ${s.attempts} calls</small></button>`;
    }).join("")}</div>`;
  }

  function activityTimelineForDate(key) {
    const items=[];
    state.calls.filter(c=>dateKeyInZone(c.completedAt)===key).forEach(c=>items.push({icon:"☎",title:`${getMerchant(c.uid)?.store_name||c.prospectCompany||"Unmatched call"}`,detail:`${c.disposition} · Real ${mmss(c.durationSec)} · Credited ${mmss(c.creditedSec)}`}));
    state.photos.filter(p=>dateKeyInZone(p.timestamp)===key).forEach(p=>items.push({icon:"▧",title:`${getMerchant(p.uid)?.store_name||"Merchant"}`,detail:`${p.photosAdded} photos · ${p.status}`}));
    state.sales.filter(x=>dateKeyInZone(x.timestamp)===key).forEach(x=>items.push({icon:"◎",title:`${getMerchant(x.uid)?.store_name||"Merchant"}`,detail:`Sales record · ${x.type} · ${x.status}`}));
    state.credits.filter(x=>dateKeyInZone(x.timestamp)===key).forEach(x=>items.push({icon:"$",title:`${getMerchant(x.uid)?.store_name||"Merchant"}`,detail:`Credit ${money2(x.amount)} · ${x.status}`}));
    state.followups.filter(f=>dateKeyInZone(f.createdAt)===key).forEach(f=>items.push({icon:"◫",title:`${getMerchant(f.uid)?.store_name||"Merchant"}`,detail:`Follow-up created · ${f.reason}`}));
    state.followups.filter(f=>f.completedAt&&dateKeyInZone(f.completedAt)===key).forEach(f=>items.push({icon:"✓",title:`${getMerchant(f.uid)?.store_name||"Merchant"}`,detail:`Follow-up completed · ${f.reason}`}));

  function renderLinks() {
    const filter = state.ui.linkFilters || { q:"", category:"all", sort:"favorites" };

  function workspaceHealth() {
    const active=state.merchants.filter(m=>!m.archived);
    const missingIds=active.filter(m=>!m.store_id).length;
    const missingTz=active.filter(m=>!m.timezone).length;
    const missingContacts=active.filter(m=>!splitMulti(m.dm_email).length&&!splitMulti(m.dm_phone).length).length;
    const duplicates=active.length-new Set(active.map(m=>m.store_id||m.uid)).size;
    return { active:active.length, missingIds, missingTz, missingContacts, duplicates, unmatched:state.unmatchedCalls.length };
  }

  function renderGlobalSearch(query) {
    const box=document.getElementById("globalSearchResults");
    const q=normalizeText(query);
    const items=state.merchants.filter(m=>!m.archived).filter(m=>!q||normalizeText([m.store_name,m.store_id,m.business_name,m.ultimate_parent_name,m.market_name,m.submarket_name,m.dm_name,m.dm_email,m.dm_phone].join(" ")).includes(q)).slice(0,12);
    if(!items.length){box.innerHTML=`<div class="empty-state" style="min-height:100px"><strong>No merchant matches</strong><span>Try a store name, Store ID, market, email or phone.</span></div>`;box.classList.add("show");return;}
    box.innerHTML=items.map(m=>`<button class="search-result" type="button" data-select-merchant="${attr(m.uid)}" data-open-view="workhub"><span><strong>${esc(m.store_name)}</strong><span>${esc([m.store_id,m.market_name,m.submarket_name].filter(Boolean).join(" · "))}</span></span><em>${esc(merchantLocalStatus(m).time)}</em></button>`).join("");
    box.classList.add("show");
  }


  function setSelectedStatus(status) {
    const merchant=selectedMerchant();if(!merchant)return;
    if(status === "Active") {
      const key=String(merchant.uid);
      const current={...merchantState(key)};
      delete current.status;
      delete current.statusDate;
      current.updatedAt=new Date().toISOString();
      const meaningful=Object.keys(current).filter(k=>k!=="updatedAt");
      if(meaningful.length) state.merchantStates[key]=current;
      else delete state.merchantStates[key];
      scheduleSave();
      renderApp();
      toast("Merchant returned to Active / Auto routing");
      return;
    }
    const patch={status,statusDate:status==="Called"?dateKeyInZone(new Date()):""};
    setMerchantState(merchant.uid,patch);
    renderApp();
    toast(`Status updated: ${status}`);
  }

  function saveStatusNote() {
    const merchant=selectedMerchant();if(!merchant)return;
    setMerchantState(merchant.uid,{note:document.getElementById("merchantStatusNote")?.value.trim()||""});
    renderApp();toast("Status note saved");
  }

  function saveManualCall() {
    const merchant=selectedMerchant();if(!merchant)return;
    const callState=document.getElementById("manualCallState")?.value||"completed";
    const duration=Math.max(0,Number(document.getElementById("manualCallDuration")?.value||0));
    const disposition=document.getElementById("manualCallDisposition")?.value||callState;
    const note=document.getElementById("manualCallNote")?.value.trim()||"";
    const now=new Date().toISOString();
    state.calls.unshift({id:uid("call"),uid:merchant.uid,state:callState,createdAt:now,completedAt:now,durationSec:duration,creditedSec:duration+(callState==="completed"?60:0),direction:"outbound",from:"",to:splitMulti(merchant.dm_phone)[0]||"",outcome:disposition,disposition,purpose:"Manual call",note,prospectId:"",prospectName:merchant.dm_name||"",prospectCompany:merchant.store_name,prospectEmail:splitMulti(merchant.dm_email)[0]||"",prospectPhones:splitMulti(merchant.dm_phone).map(digits),userName:state.profile.username||"Workspace user",source:"Manual",manual:true,importedAt:now,matchMethod:"manual",matchConfidence:100});
    setMerchantState(merchant.uid,{status:callState==="completed"?"Called":callState==="no_answer"?"No Answer":"To Call",statusDate:dateKeyInZone(new Date())});
    scheduleSave();renderApp();toast(`Manual call added · Credited ${mmss(duration+(callState==="completed"?60:0))}`);
  }

  function savePhotoLog() {
    const merchant=selectedMerchant();if(!merchant)return;
    const count=Math.max(0,Number(document.getElementById("photoCountNow")?.value||0));
    if(!count)return toast("Enter at least one photo");
    const status=document.getElementById("photoStatus")?.value||"Pending";
    const note=document.getElementById("photoNotes")?.value.trim()||"";
    const before=merchant.photo_coverage;
    const after=before==null?count:clamp(Number(before)+count,0,100);
    merchant.photo_coverage=after;
    const st=merchantState(merchant.uid);
    const remaining=st.photoMissingRemaining==null||st.photoMissingRemaining===""?"":Math.max(0,Number(st.photoMissingRemaining)-count);
    state.photos.unshift({id:uid("photo"),uid:merchant.uid,timestamp:new Date().toISOString(),photosAdded:count,status,source:"Manual",note,user:state.profile.username||"Workspace user",coverageBefore:before,coverageAfter:after});
    setMerchantState(merchant.uid,{photoStatus:status,photoMissingRemaining:remaining,photoDraftCount:1,photoDraftNote:""});
    scheduleSave();renderApp();toast(`${count} photo${count===1?"":"s"} saved`);
  }

  function savePhotoTracker() {
    const merchant=selectedMerchant();if(!merchant)return;
    const remaining=document.getElementById("photoMissingRemaining")?.value;
    const status=document.getElementById("photoStatus")?.value||"Needs Photos";
    const draftCount=Math.max(0,Number(document.getElementById("photoCountNow")?.value||0));
    const draftNote=document.getElementById("photoNotes")?.value.trim()||"";
    setMerchantState(merchant.uid,{photoMissingRemaining:remaining===""?"":Math.max(0,Number(remaining)),photoStatus:status,photoDraftCount:draftCount,photoDraftNote:draftNote});
    renderApp();toast("Photo tracker saved");
  }

  function deleteLastPhoto() {
    const merchant=selectedMerchant();if(!merchant)return;

  function fileToDataUrl(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>reject(r.error);r.readAsDataURL(file);});}
  function extractPalette(dataUrl){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>{const canvas=document.createElement("canvas"),ctx=canvas.getContext("2d",{willReadFrequently:true});canvas.width=48;canvas.height=48;ctx.drawImage(img,0,0,48,48);const data=ctx.getImageData(0,0,48,48).data;const buckets=new Map();for(let i=0;i<data.length;i+=16){const a=data[i+3];if(a<180)continue;let r=data[i],g=data[i+1],b=data[i+2];const lum=.2126*r+.7152*g+.0722*b;if(lum<30||lum>235)continue;r=Math.round(r/32)*32;g=Math.round(g/32)*32;b=Math.round(b/32)*32;const key=`${r},${g},${b}`;buckets.set(key,(buckets.get(key)||0)+1);}const colors=[...buckets.entries()].sort((a,b)=>b[1]-a[1]).map(([k])=>`#${k.split(",").map(n=>clamp(Number(n),0,255).toString(16).padStart(2,"0")).join("")}`);resolve([colors[0]||"#8b5cf6",colors.find(c=>colorDistance(c,colors[0])>90)||colors[1]||"#2563eb"]);};img.onerror=reject;img.src=dataUrl;});}
  function colorDistance(a,b){const x=hexToRgb(a),y=hexToRgb(b);return Math.hypot(x[0]-y[0],x[1]-y[1],x[2]-y[2]);}
